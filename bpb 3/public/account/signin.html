<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Bayside Pavers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bp-green: #5d7e69; --bp-green-dk: #4a6554; --bp-green-soft: #e8eee9;
    --bp-charcoal: #353535; --bp-tan: #dad7c5; --bp-cream: #faf8f3;
    --bp-bg: #f4f4ef; --bp-card: #ffffff; --bp-border: #e4e4df;
    --bp-text: #1f2125; --bp-muted: #70726f;
    --bp-err: #b91c1c; --bp-err-bg: #fef2f2; --bp-err-bd: #fecaca;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Onest', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--bp-text); background: var(--bp-bg);
    background-image: radial-gradient(ellipse 800px 500px at 50% -10%, var(--bp-green-soft), transparent 70%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px 16px; line-height: 1.5; font-size: 16px;
  }
  .ho-wrap { width: 100%; max-width: 440px; }
  .ho-brand { text-align: center; margin-bottom: 28px; }
  .ho-brand img { height: 40px; width: auto; }
  .ho-brand-tag {
    margin-top: 14px; font-size: 11px; letter-spacing: 0.22em;
    color: var(--bp-muted); text-transform: uppercase;
  }
  .ho-card {
    background: var(--bp-card); border: 1px solid var(--bp-border);
    border-radius: 14px; padding: 38px 34px;
    box-shadow: 0 16px 40px rgba(31, 33, 37, 0.08);
  }
  .ho-eyebrow {
    font-size: 11px; letter-spacing: 0.18em; color: var(--bp-muted);
    text-transform: uppercase; margin-bottom: 10px; font-weight: 600;
  }
  .ho-title {
    font-size: 24px; font-weight: 600; color: var(--bp-text);
    letter-spacing: -0.012em; line-height: 1.25; margin-bottom: 8px;
  }
  .ho-lede { color: var(--bp-muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .ho-form { display: flex; flex-direction: column; gap: 16px; }
  .ho-field { display: flex; flex-direction: column; gap: 6px; }
  .ho-field-label { font-size: 12px; font-weight: 600; color: var(--bp-charcoal); }
  .ho-field input {
    font-family: inherit; font-size: 15px; padding: 12px 14px;
    border: 1px solid var(--bp-border); border-radius: 10px; background: #fff;
    color: var(--bp-text); width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  .ho-field input:focus {
    outline: none; border-color: var(--bp-green);
    box-shadow: 0 0 0 3px rgba(93, 126, 105, 0.18);
  }
  .ho-btn {
    padding: 13px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; border: 1px solid transparent;
    transition: background .15s, transform .12s, box-shadow .15s, opacity .15s;
  }
  .ho-btn-primary {
    background: var(--bp-green); color: #fff;
    box-shadow: 0 6px 16px rgba(93, 126, 105, 0.22);
  }
  .ho-btn-primary:hover {
    background: var(--bp-green-dk); transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(93, 126, 105, 0.28);
  }
  .ho-btn-secondary {
    background: #fff; color: var(--bp-charcoal);
    border-color: var(--bp-border); width: 100%;
  }
  .ho-btn-secondary:hover {
    background: var(--bp-cream); border-color: var(--bp-green-soft);
    color: var(--bp-charcoal);
  }
  .ho-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .ho-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 18px 0 4px; color: var(--bp-muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    font-weight: 600;
  }
  .ho-divider::before, .ho-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--bp-border);
  }
  .ho-foot { text-align: center; margin-top: 8px; }
  .ho-link {
    background: none; border: none; color: var(--bp-green-dk);
    font: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; padding: 6px 10px; border-radius: 6px;
    transition: color .12s, background .12s;
    text-decoration: none; display: inline-block;
  }
  .ho-link:hover { color: var(--bp-green); background: var(--bp-green-soft); }
  .ho-status {
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; line-height: 1.5; margin-top: 4px;
  }
  .ho-status.is-error {
    background: var(--bp-err-bg); color: var(--bp-err);
    border: 1px solid var(--bp-err-bd);
  }
  .ho-status.is-success {
    background: var(--bp-green-soft); color: var(--bp-green-dk);
    border: 1px solid #c8d8cc;
  }
  .ho-status[hidden] { display: none; }

  .ho-team-link {
    text-align: center; margin-top: 20px;
    font-size: 13px; color: var(--bp-muted); line-height: 1.6;
  }
  .ho-team-link a {
    color: var(--bp-charcoal); text-decoration: none; font-weight: 600;
    border-bottom: 1px dotted var(--bp-border); padding-bottom: 1px;
    margin-left: 4px; transition: color .15s, border-color .15s;
  }
  .ho-team-link a:hover {
    color: var(--bp-green-dk); border-bottom-color: var(--bp-green);
  }

  @media (max-width: 480px) {
    .ho-card { padding: 30px 22px; }
    .ho-title { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="ho-wrap">
  <div class="ho-brand">
    <img src="https://cdn.prod.website-files.com/65a1ca4354f63bd7376b5027/69a04f4369bc9cc20b8d2155_BaysidePavers_original%20(2)%20(1).png" alt="Bayside Pavers">
    <div class="ho-brand-tag">Creating backyards people love</div>
  </div>

  <div class="ho-card">
    <div class="ho-eyebrow">Welcome back</div>
    <h1 class="ho-title">Sign in to your account</h1>
    <p class="ho-lede">Access your proposal, design resources, and project updates.</p>

    <form class="ho-form" id="ho-signin-form" novalidate>
      <label class="ho-field">
        <span class="ho-field-label">Email</span>
        <input type="email" name="email" id="ho-email" required autocomplete="email" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus>
      </label>
      <label class="ho-field">
        <span class="ho-field-label">Password</span>
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="ho-btn ho-btn-primary" id="ho-signin-submit">Sign in</button>
      <div class="ho-foot">
        <a class="ho-link" href="/account/forgot.html">Forgot your password?</a>
      </div>
    </form>

    <div class="ho-divider">or</div>

    <button type="button" class="ho-btn ho-btn-secondary" id="ho-magic-btn" style="margin-top:8px;">
      Email me a sign-in link
    </button>
    <p style="margin:8px 0 0;font-size:12px;color:var(--bp-muted);text-align:center;line-height:1.5;">
      We&#39;ll send a one-click link to the email above. No password needed.
    </p>

    <div class="ho-status" id="ho-status" hidden></div>
  </div>

  <div class="ho-team-link">
    Bayside team member?<a href="/login.html">Sign in here →</a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

const SUPABASE_URL  = 'https://gfgbypcnxkschnfsitfb.supabase.co';
const SUPABASE_ANON = 'sb_publishable_Ko4LNw2VjhZVFmwJ-i2qtA_XeGgBcew';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
});

const form      = document.getElementById('ho-signin-form');
const submitBtn = document.getElementById('ho-signin-submit');
const magicBtn  = document.getElementById('ho-magic-btn');
const emailEl   = document.getElementById('ho-email');
const statusEl  = document.getElementById('ho-status');

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'ho-status is-' + (type || 'error');
  statusEl.hidden = false;
}
function hideStatus() { statusEl.hidden = true; statusEl.textContent = ''; }

// If already signed in, route appropriately.
const { data: { session } } = await supabase.auth.getSession();
if (session) await routeAfterAuth();

async function routeAfterAuth() {
  const { data: clientRow } = await supabase
    .from('clients')
    .select('must_change_password')
    .eq('user_id', (await supabase.auth.getUser()).data.user.id)
    .maybeSingle();

  if (clientRow && clientRow.must_change_password) {
    window.location.replace('/account/welcome.html');
  } else {
    window.location.replace('/account/');
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideStatus();

  const fd = new FormData(form);
  const email    = String(fd.get('email') || '').trim().toLowerCase();
  const password = String(fd.get('password') || '');

  if (!email || !password) { showStatus('Email and password are both required.'); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in…';
  try {
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    await routeAfterAuth();
  } catch (err) {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign in';
    const msg = (err && err.message) || 'Sign in failed.';
    if (/invalid login credentials/i.test(msg)) {
      showStatus("That email and password don't match. Try \"Email me a sign-in link\" below — no password needed.");
    } else {
      showStatus(msg);
    }
  }
});

magicBtn.addEventListener('click', async () => {
  hideStatus();
  const email = emailEl.value.trim().toLowerCase();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showStatus('Enter your email address above first.');
    emailEl.focus();
    return;
  }

  magicBtn.disabled = true;
  magicBtn.textContent = 'Sending link…';
  try {
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + '/account/welcome.html',
        shouldCreateUser: false,
      },
    });
    if (error) throw error;
    showStatus('Check your email — a sign-in link is on its way to ' + email + '.', 'success');
    magicBtn.textContent = 'Link sent ✓';
    // Don't re-enable; user should switch to email.
  } catch (err) {
    magicBtn.disabled = false;
    magicBtn.textContent = 'Email me a sign-in link';
    const msg = (err && err.message) || 'Could not send link.';
    showStatus(msg);
  }
});
</script>
</body>
</html>
