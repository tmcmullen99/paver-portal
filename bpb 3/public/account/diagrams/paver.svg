<svg viewBox="0 0 980 680" xmlns="http://www.w3.org/2000/svg" font-family="'Onest', -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <!-- Compacted native subgrade: warm earth with scattered grit -->
    <pattern id="soil" width="28" height="24" patternUnits="userSpaceOnUse">
      <rect width="28" height="24" fill="#8c7a62"/>
      <path d="M3 7 q3 -3 6 0" stroke="#71604a" stroke-width="1.2" fill="none" opacity="0.5"/>
      <path d="M15 19 q2.5 -2.5 5 0" stroke="#71604a" stroke-width="1" fill="none" opacity="0.42"/>
      <circle cx="19" cy="11" r="1.7" fill="#6c5b45" opacity="0.55"/>
      <circle cx="7" cy="17" r="1.1" fill="#6c5b45" opacity="0.5"/>
      <circle cx="24" cy="20" r="1" fill="#6c5b45" opacity="0.45"/>
    </pattern>

    <!-- Compacted aggregate base: angular crushed rock -->
    <pattern id="aggregate" width="32" height="28" patternUnits="userSpaceOnUse">
      <rect width="32" height="28" fill="#b0afa4"/>
      <polygon points="6,5 12,7 10,13 4,11" fill="#959489" opacity="0.75"/>
      <polygon points="21,4 27,6 26,12 20,11" fill="#8f8e83" opacity="0.6"/>
      <polygon points="14,16 20,18 18,24 12,22" fill="#9b9a8f" opacity="0.7"/>
      <polygon points="1,19 6,20 5,26 0,24" fill="#8f8e83" opacity="0.55"/>
      <polygon points="26,18 31,20 29,26 24,24" fill="#969588" opacity="0.6"/>
    </pattern>

    <!-- Coarse bedding sand -->
    <pattern id="sand" width="13" height="11" patternUnits="userSpaceOnUse">
      <rect width="13" height="11" fill="#e6dabd"/>
      <circle cx="2.5" cy="3" r="0.9" fill="#ccbb95"/>
      <circle cx="8" cy="7" r="0.9" fill="#ccbb95"/>
      <circle cx="11" cy="2" r="0.8" fill="#d4c6a4"/>
      <circle cx="5" cy="9.5" r="0.8" fill="#d4c6a4"/>
    </pattern>

    <!-- Cast concrete edge restraint -->
    <pattern id="concrete" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="20" height="20" fill="#cdc8bb"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#b3ad9e" stroke-width="1" opacity="0.45"/>
    </pattern>

    <linearGradient id="paverTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfc4a8"/>
      <stop offset="1" stop-color="#bcb094"/>
    </linearGradient>
  </defs>

  <!-- Paper -->
  <rect width="980" height="680" fill="#faf8f3"/>
  <rect x="24" y="24" width="932" height="632" fill="none" stroke="#e3ddcd" stroke-width="1"/>

  <!-- ── Title block ────────────────────────────────────────────── -->
  <text x="70" y="62" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12.5"
        letter-spacing="3" fill="#5d7e69" font-weight="600">BAYSIDE · HOW WE BUILD IT</text>
  <text x="69" y="100" font-family="'Playfair Display', Georgia, serif" font-size="33"
        fill="#353535" font-weight="600">Anatomy of an interlocking paver install</text>
  <line x1="70" y1="120" x2="470" y2="120" stroke="#d8d1bf" stroke-width="1.5"/>

  <!-- ── Joint-sand callout (above the field) ──────────────────── -->
  <line x1="290" y1="128" x2="290" y2="150" stroke="#9c906f" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="290" cy="150" r="2.4" fill="#9c906f"/>
  <text x="290" y="142" text-anchor="middle" font-style="italic" font-size="13" fill="#7a6f54">polymeric joint sand</text>

  <!-- ════ CROSS-SECTION STACK (x 70–470) ════ -->

  <!-- Subgrade -->
  <rect x="70" y="388" width="400" height="160" fill="url(#soil)"/>
  <!-- Geotextile fabric -->
  <rect x="70" y="378" width="400" height="10" fill="#7f8a6e"/>
  <line x1="70" y1="383" x2="470" y2="383" stroke="#faf8f3" stroke-width="1" stroke-dasharray="7 5" opacity="0.85"/>
  <!-- Aggregate base -->
  <rect x="70" y="228" width="400" height="150" fill="url(#aggregate)"/>
  <!-- Bedding sand -->
  <rect x="70" y="198" width="400" height="30" fill="url(#sand)"/>

  <!-- Paver field (x 110–470), 6 units -->
  <rect x="110" y="150" width="360" height="48" fill="url(#paverTop)"/>
  <line x1="110" y1="152" x2="470" y2="152" stroke="#ddd2b7" stroke-width="1.5"/>
  <g stroke="#9c906f" stroke-width="3">
    <line x1="170" y1="150" x2="170" y2="198"/>
    <line x1="230" y1="150" x2="230" y2="198"/>
    <line x1="290" y1="150" x2="290" y2="198"/>
    <line x1="350" y1="150" x2="350" y2="198"/>
    <line x1="410" y1="150" x2="410" y2="198"/>
  </g>

  <!-- Cast concrete edge restraint (left haunch) -->
  <polygon points="70,150 110,150 110,300 70,262" fill="url(#concrete)" stroke="#b3ad9e" stroke-width="1"/>

  <!-- Outer hairline around full stack -->
  <rect x="70" y="150" width="400" height="398" fill="none" stroke="#cfc6b2" stroke-width="1.25"/>

  <!-- ── Leaders + labels (right) ──────────────────────────────── -->
  <g stroke="#5d7e69" stroke-width="1.1" fill="none">
    <path d="M470 174 L504 174 L520 150"/>
    <path d="M470 213 L504 213 L520 232"/>
    <path d="M470 303 L504 303 L520 318"/>
    <path d="M470 383 L504 383 L520 404"/>
    <path d="M470 468 L504 468 L520 486"/>
  </g>
  <g fill="#5d7e69">
    <circle cx="470" cy="174" r="2.6"/><circle cx="470" cy="213" r="2.6"/>
    <circle cx="470" cy="303" r="2.6"/><circle cx="470" cy="383" r="2.6"/>
    <circle cx="470" cy="468" r="2.6"/>
  </g>

  <!-- Label: pavers -->
  <text x="528" y="145" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">01</text>
  <text x="528" y="166" font-size="17" fill="#353535" font-weight="600">Interlocking pavers</text>
  <text x="528" y="186" font-size="13.5" fill="#6b6b63">Concrete or porcelain units, sand-set so the field</text>
  <text x="528" y="204" font-size="13.5" fill="#6b6b63">flexes and locks instead of cracking.</text>

  <!-- Label: bedding -->
  <text x="528" y="227" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">02</text>
  <text x="528" y="248" font-size="17" fill="#353535" font-weight="600">Bedding sand</text>
  <text x="528" y="268" font-size="13.5" fill="#6b6b63">~1 in. of coarse sand, screeded dead level for an</text>
  <text x="528" y="286" font-size="13.5" fill="#6b6b63">even seat under every unit.</text>

  <!-- Label: aggregate base -->
  <text x="528" y="313" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">03</text>
  <text x="528" y="334" font-size="17" fill="#353535" font-weight="600">Compacted aggregate base</text>
  <text x="528" y="354" font-size="13.5" fill="#6b6b63">Crushed road base, graded for drainage and</text>
  <text x="528" y="372" font-size="13.5" fill="#6b6b63">stability. Typ. 4–6 in. patios, 8–12 in. driveways.</text>

  <!-- Label: geotextile -->
  <text x="528" y="399" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">04</text>
  <text x="528" y="420" font-size="17" fill="#353535" font-weight="600">Geotextile fabric</text>
  <text x="528" y="440" font-size="13.5" fill="#6b6b63">A separation layer that keeps base rock and</text>
  <text x="528" y="458" font-size="13.5" fill="#6b6b63">native soil from migrating into each other.</text>

  <!-- Label: subgrade -->
  <text x="528" y="481" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">05</text>
  <text x="528" y="502" font-size="17" fill="#353535" font-weight="600">Compacted subgrade</text>
  <text x="528" y="522" font-size="13.5" fill="#6b6b63">Native soil cleared and compacted to a firm,</text>
  <text x="528" y="540" font-size="13.5" fill="#6b6b63">graded foundation — the whole job rests here.</text>

  <!-- Edge restraint label (routed down the left gutter, clear of the stack) -->
  <path d="M70 262 L50 262 L50 560 L68 560" stroke="#5d7e69" stroke-width="1.1" fill="none"/>
  <circle cx="70" cy="262" r="2.6" fill="#5d7e69"/>
  <text x="72" y="560" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">EDGE RESTRAINT</text>
  <text x="72" y="580" font-size="15" fill="#353535" font-weight="600">Cast concrete edge restraint</text>
  <text x="72" y="598" font-size="12.5" fill="#6b6b63">Locks the perimeter so the field can't spread.</text>

  <!-- ── Footer caveat ─────────────────────────────────────────── -->
  <line x1="70" y1="616" x2="910" y2="616" stroke="#e3ddcd" stroke-width="1"/>
  <text x="70" y="640" font-size="12.5" fill="#9a9384">Typical assembly. Depths and materials vary by load, soil, and local code — your project's engineered spec governs the final build.</text>
</svg>
