<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set your password · Bayside Pavers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bp-green:    #5d7e69;
    --bp-green-dk: #4a6554;
    --bp-green-soft: #e8eee9;
    --bp-charcoal: #353535;
    --bp-tan:      #dad7c5;
    --bp-cream:    #faf8f3;
    --bp-bg:       #f4f4ef;
    --bp-card:     #ffffff;
    --bp-border:   #e4e4df;
    --bp-text:     #1f2125;
    --bp-muted:    #70726f;
    --bp-err:      #b91c1c;
    --bp-err-bg:   #fef2f2;
    --bp-err-bd:   #fecaca;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Onest', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--bp-text);
    background: var(--bp-bg);
    background-image: radial-gradient(ellipse 800px 500px at 50% -10%, var(--bp-green-soft), transparent 70%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    line-height: 1.5; font-size: 16px;
  }
  .ho-wrap { width: 100%; max-width: 440px; }
  .ho-brand { text-align: center; margin-bottom: 28px; }
  .ho-brand img { height: 40px; width: auto; }
  .ho-brand-tag {
    margin-top: 14px; font-size: 11px; letter-spacing: 0.22em;
    color: var(--bp-muted); text-transform: uppercase;
  }
  .ho-card {
    background: var(--bp-card);
    border: 1px solid var(--bp-border);
    border-radius: 14px;
    padding: 38px 34px;
    box-shadow: 0 16px 40px rgba(31, 33, 37, 0.08);
  }
  .ho-eyebrow {
    font-size: 11px; letter-spacing: 0.18em;
    color: var(--bp-muted); text-transform: uppercase;
    margin-bottom: 10px; font-weight: 600;
  }
  .ho-title {
    font-size: 24px; font-weight: 600;
    color: var(--bp-text); letter-spacing: -0.012em;
    line-height: 1.25; margin-bottom: 8px;
  }
  .ho-lede {
    color: var(--bp-muted);
    font-size: 14px; line-height: 1.6;
    margin-bottom: 24px;
  }
  .ho-form { display: flex; flex-direction: column; gap: 16px; }
  .ho-field { display: flex; flex-direction: column; gap: 6px; }
  .ho-field-label { font-size: 12px; font-weight: 600; color: var(--bp-charcoal); }
  .ho-field input {
    font-family: inherit; font-size: 15px;
    padding: 12px 14px;
    border: 1px solid var(--bp-border);
    border-radius: 10px; background: #fff;
    color: var(--bp-text); width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  .ho-field input:focus {
    outline: none;
    border-color: var(--bp-green);
    box-shadow: 0 0 0 3px rgba(93, 126, 105, 0.18);
  }
  .ho-help {
    font-size: 12px; color: var(--bp-muted); margin-top: 2px;
  }
  .ho-btn {
    padding: 13px 20px;
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    border: 1px solid transparent;
    transition: background .15s, transform .12s, box-shadow .15s, opacity .15s;
  }
  .ho-btn-primary {
    background: var(--bp-green); color: #fff;
    box-shadow: 0 6px 16px rgba(93, 126, 105, 0.22);
  }
  .ho-btn-primary:hover {
    background: var(--bp-green-dk);
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(93, 126, 105, 0.28);
  }
  .ho-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .ho-error {
    background: var(--bp-err-bg); color: var(--bp-err);
    border: 1px solid var(--bp-err-bd);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; line-height: 1.5; margin-top: 4px;
  }
  .ho-error[hidden] { display: none; }
  .ho-loading-shell { text-align: center; padding: 30px 0; color: var(--bp-muted); font-size: 13px; }
  @media (max-width: 480px) {
    .ho-card { padding: 30px 22px; }
    .ho-title { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="ho-wrap">
  <div class="ho-brand">
    <img src="https://cdn.prod.website-files.com/65a1ca4354f63bd7376b5027/69a04f4369bc9cc20b8d2155_BaysidePavers_original%20(2)%20(1).png" alt="Bayside Pavers">
    <div class="ho-brand-tag">Creating backyards people love</div>
  </div>

  <div class="ho-card">
    <div id="ho-loading" class="ho-loading-shell">Loading…</div>

    <div id="ho-content" hidden>
      <div class="ho-eyebrow">One-time setup</div>
      <h1 class="ho-title">Choose your password</h1>
      <p class="ho-lede">For your security, please replace the temporary password with one of your own.</p>

      <form class="ho-form" id="ho-pw-form" novalidate>
        <label class="ho-field">
          <span class="ho-field-label">New password</span>
          <input type="password" name="password" required autocomplete="new-password" minlength="8" autofocus>
          <span class="ho-help">At least 8 characters.</span>
        </label>
        <label class="ho-field">
          <span class="ho-field-label">Confirm new password</span>
          <input type="password" name="confirm" required autocomplete="new-password" minlength="8">
        </label>
        <button type="submit" class="ho-btn ho-btn-primary" id="ho-pw-submit">Set password &amp; continue</button>
      </form>

      <div class="ho-error" id="ho-error" hidden></div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

const SUPABASE_URL  = 'https://gfgbypcnxkschnfsitfb.supabase.co';
const SUPABASE_ANON = 'sb_publishable_Ko4LNw2VjhZVFmwJ-i2qtA_XeGgBcew';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
});

const loadingEl = document.getElementById('ho-loading');
const contentEl = document.getElementById('ho-content');
const form      = document.getElementById('ho-pw-form');
const submitBtn = document.getElementById('ho-pw-submit');
const errorEl   = document.getElementById('ho-error');

function showError(msg) { errorEl.textContent = msg; errorEl.hidden = false; }
function hideError()     { errorEl.hidden = true; errorEl.textContent = ''; }

// Gate: must be authenticated, must still need password change.
const { data: { session } } = await supabase.auth.getSession();
if (!session) {
  window.location.replace('/account/signin.html');
} else {
  const { data: { user } } = await supabase.auth.getUser();
  const { data: clientRow, error: clientErr } = await supabase
    .from('clients')
    .select('must_change_password')
    .eq('user_id', user.id)
    .maybeSingle();

  if (clientErr) {
    loadingEl.textContent = 'Could not load your account. Please refresh.';
  } else if (!clientRow) {
    // Authenticated but no clients row — internal user landed here by mistake.
    window.location.replace('/account/');
  } else if (!clientRow.must_change_password) {
    // Already set their own password; skip this page.
    window.location.replace('/account/');
  } else {
    loadingEl.hidden = true;
    contentEl.hidden = false;
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();

  const fd = new FormData(form);
  const password = String(fd.get('password') || '');
  const confirm  = String(fd.get('confirm') || '');

  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showError("Passwords don't match."); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Setting password…';
  try {
    // Update Supabase Auth password.
    const { error: updErr } = await supabase.auth.updateUser({ password });
    if (updErr) throw updErr;

    // Flip must_change_password=false on clients row.
    const { data: { user } } = await supabase.auth.getUser();
    const { error: clientErr } = await supabase
      .from('clients')
      .update({ must_change_password: false })
      .eq('user_id', user.id);
    if (clientErr) {
      // Password was changed, but flag flip failed. Don't block — log and move on.
      console.warn('Could not clear must_change_password flag:', clientErr);
    }

    window.location.replace('/account/');
  } catch (err) {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Set password & continue';
    showError((err && err.message) || 'Could not set password.');
  }
});
</script>
</body>
</html>
