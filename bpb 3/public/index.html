<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paver Portal · Redirecting…</title>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Onest', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f4ef; color: #1f2125;
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px;
    }
    .card {
      background: #fff;
      border: 1px solid #e4e4df;
      border-radius: 12px;
      padding: 32px 36px;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(31, 33, 37, 0.06);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #f1e7d3;
      border-top-color: #9c7440;
      border-radius: 50%;
      margin: 0 auto 18px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 16px; font-weight: 600; margin: 0 0 6px; color: #1f2125; }
    p { font-size: 13px; color: #70726f; margin: 0; line-height: 1.5; }
    .fallback { margin-top: 18px; }
    .fallback a { color: #9c7440; font-weight: 600; text-decoration: none; }
    .fallback a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Routing you to the right place…</h1>
    <p id="ho-route-msg">Checking your account.</p>
    <p class="fallback" id="ho-fallback" style="display:none;">
      Stuck? <a href="/account/signin.html">Continue to sign-in</a>
    </p>
  </div>

  <script type="module">
    /*
     * Phase 6.6 Sprint 6 Step 1 — role-aware root router.
     *
     * Replaces the prior meta-refresh-to-signin stub. That stub broke
     * navigation for authenticated designers/admin: clicking the topbar
     * logo on /dashboard.html or /admin/ landed here, which immediately
     * forwarded to /account/signin.html (the homeowner sign-in page) —
     * even though the user was already authenticated as staff. The new
     * flow checks session + role and routes to the correct surface:
     *
     *   master       -> /admin/
     *   designer     -> /dashboard.html
     *   homeowner    -> /account/
     *   unauthed     -> /account/signin.html  (preserves prior default)
     *
     * The 1.5s fallback timer is defensive: if the auth check or role
     * lookup hangs, we fall through to the public sign-in rather than
     * leaving the user staring at a spinner forever.
     */
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

    const SUPABASE_URL = 'https://gfgbypcnxkschnfsitfb.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_Ko4LNw2VjhZVFmwJ-i2qtA_XeGgBcew';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    const routeMsg = document.getElementById('ho-route-msg');
    const fallback = document.getElementById('ho-fallback');

    const fallbackTimer = setTimeout(() => {
      fallback.style.display = 'block';
      window.location.replace('/account/signin.html');
    }, 1500);

    function go(path, label) {
      clearTimeout(fallbackTimer);
      routeMsg.textContent = label;
      window.location.replace(path);
    }

    try {
      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        go('/account/signin.html', 'Taking you to sign-in.');
      } else {
        const userId = session.user.id;

        const { data: profile } = await supabase
          .from('profiles')
          .select('role, is_active')
          .eq('id', userId)
          .maybeSingle();

        if (profile && profile.is_active) {
          if (profile.role === 'master') {
            go('/admin/', 'Taking you to the admin dashboard.');
          } else if (profile.role === 'designer') {
            go('/dashboard.html', 'Taking you to your dashboard.');
          } else {
            go('/account/signin.html', 'Account not recognized.');
          }
        } else {
          const { data: client } = await supabase
            .from('clients')
            .select('id')
            .eq('user_id', userId)
            .maybeSingle();

          if (client) {
            go('/account/', 'Taking you to your account.');
          } else {
            go('/account/signin.html', 'No account found for this sign-in.');
          }
        }
      }
    } catch (err) {
      console.error('Root router error:', err);
      go('/account/signin.html', 'Something went wrong. Sending you to sign-in.');
    }
  </script>
</body>
</html>
