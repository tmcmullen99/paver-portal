<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notifications · Paver Portal Proposal Builder</title>
  <style>
    :root {
      --bp-green:#9c7440; --bp-cream:#faf8f3; --bp-text:#353535; --bp-line:#ece9dd; --bp-tan:#dad7c5;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--bp-text); background:var(--bp-cream); line-height:1.5; }
    .nb-shell { max-width:1100px; margin:0 auto; padding:28px 24px 80px; }
    .nb-topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .nb-topbar h1 { margin:0; font-size:24px; font-weight:600; letter-spacing:-0.01em; }
    .nb-back { color:#666; text-decoration:none; font-size:14px; }
    .nb-back:hover { color:var(--bp-green); }
    .nb-tabs { display:flex; gap:0; margin-bottom:18px; border-bottom:1px solid var(--bp-line); }
    .nb-tab { background:transparent; border:0; padding:11px 18px; font-size:14px; font-weight:500; color:#888; cursor:pointer; font-family:inherit; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .nb-tab.active { color:var(--bp-green); border-bottom-color:var(--bp-green); }
    .nb-tab .nb-count { background:#eee; padding:1px 7px; border-radius:10px; font-size:11px; margin-left:6px; color:#666; }
    .nb-tab.active .nb-count { background:var(--bp-green); color:#fff; }
    .nb-pane { display:none; }
    .nb-pane.active { display:block; }
    .nb-empty { padding:60px 20px; text-align:center; color:#888; }
    .nb-list { display:flex; flex-direction:column; gap:8px; }
    .nb-card { background:#fff; border:1px solid var(--bp-line); border-radius:8px; padding:16px 20px; display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:center; }
    .nb-card-icon { font-size:18px; width:32px; text-align:center; }
    .nb-card-main { min-width:0; }
    .nb-card-kind { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--bp-green); }
    .nb-card-subject { margin-top:2px; font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .nb-card-meta { margin-top:3px; font-size:12px; color:#888; display:flex; gap:10px; flex-wrap:wrap; }
    .nb-card-recipient { color:#555; }
    .nb-card-actions { display:flex; gap:6px; }
    .nb-btn { background:#fff; border:1px solid var(--bp-line); padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit; color:#555; }
    .nb-btn:hover { background:#f6f4ee; }
    .nb-btn.primary { background:var(--bp-green); border-color:var(--bp-green); color:#fff; }
    .nb-btn.primary:hover { background:#4d6a59; }
    .nb-btn.danger:hover { background:#fce8e8; border-color:#d99; color:#b33; }
    .nb-status-ok { color:#9c7440; }
    .nb-status-err { color:#b53; }
    .nb-status-skip { color:#888; }
    .nb-loading { padding:60px 0; text-align:center; color:#888; }
    .nb-reschedule-form { display:flex; align-items:center; gap:8px; padding:12px 20px; background:#f7f5ee; border-top:1px solid var(--bp-line); border-radius:0 0 8px 8px; margin-top:-1px; font-size:12px; }
    .nb-reschedule-form input { padding:5px 8px; border:1px solid #d6d4cc; border-radius:5px; font-size:12px; font-family:inherit; }
  </style>
</head>
<body>
  <div class="nb-shell" id="shell">
    <div class="nb-loading">Loading notifications…</div>
  </div>

  <template id="page-tpl">
    <div class="nb-topbar">
      <h1>Notifications</h1>
      <div>
        <a class="nb-back" href="/admin/notification-settings.html" style="margin-right:18px">Settings</a>
        <a class="nb-back" href="/admin">← Admin</a>
      </div>
    </div>
    <div class="nb-tabs">
      <button class="nb-tab active" data-tab="queued">Queued <span class="nb-count" id="count-queued">0</span></button>
      <button class="nb-tab" data-tab="recent">Recent <span class="nb-count" id="count-recent">0</span></button>
    </div>
    <div class="nb-pane active" data-pane="queued"><div class="nb-list" id="list-queued"></div></div>
    <div class="nb-pane" data-pane="recent"><div class="nb-list" id="list-recent"></div></div>
  </template>

  <script type="module">
    import { supa } from './admin-shell.js';

    const shell = document.getElementById('shell');
    const KIND_LABELS = {
      new_proposal:'New proposal', proposal_update:'Proposal update', message_received:'Message',
      sign_event:'Signed!', signing_reminder:'Discount reminder', substitution_received:'Substitution',
      substitution_response:'Substitution response', redesign_received:'Redesign', redesign_response:'Redesign response',
      referral_converted:'Referral converted', test_notification:'Test', first_view:'First view'
    };
    const KIND_ICONS = {
      new_proposal:'📄', proposal_update:'📝', message_received:'💬', sign_event:'🎉',
      signing_reminder:'⏰', substitution_received:'🔄', substitution_response:'↩️',
      redesign_received:'✏️', redesign_response:'↩️', referral_converted:'🎁', test_notification:'🧪', first_view:'👀'
    };

    const { data: { user } } = await supa.auth.getUser();
    if (!user) { window.location.href = '/admin'; throw new Error('Not signed in'); }
    const { data: profile } = await supa.from('profiles').select('role, is_active').eq('id', user.id).maybeSingle();
    if (!profile || !profile.is_active || !['master','designer'].includes(profile.role)) {
      shell.innerHTML = '<div class="nb-loading">Staff only.</div>'; throw new Error('Not staff');
    }

    shell.innerHTML = '';
    shell.appendChild(document.getElementById('page-tpl').content.cloneNode(true));

    shell.querySelectorAll('.nb-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        shell.querySelectorAll('.nb-tab').forEach(b => b.classList.toggle('active', b === btn));
        shell.querySelectorAll('.nb-pane').forEach(p => p.classList.toggle('active', p.dataset.pane === btn.dataset.tab));
      });
    });

    function relTime(iso) {
      if (!iso) return '';
      const d = new Date(iso), now = new Date();
      const sec = Math.round((d - now) / 1000);
      const abs = Math.abs(sec);
      const future = sec > 0;
      let n, unit;
      if (abs < 60) return future ? 'in <1m' : 'just now';
      if (abs < 3600) { n = Math.round(abs/60); unit = 'm'; }
      else if (abs < 86400) { n = Math.round(abs/3600); unit = 'h'; }
      else { n = Math.round(abs/86400); unit = 'd'; }
      return future ? `in ${n}${unit}` : `${n}${unit} ago`;
    }

    function renderCard(row, isQueued) {
      const kindLabel = KIND_LABELS[row.notification_kind] || row.notification_kind;
      const icon = KIND_ICONS[row.notification_kind] || '✉️';
      const subject = row.rendered_subject || ('Will render: ' + kindLabel);
      const timeStr = isQueued
        ? `Scheduled ${relTime(row.scheduled_for)}`
        : `${row.status === 'sent' ? 'Sent' : row.status} ${relTime(row.sent_at || row.created_at)}`;
      const statusClass = row.status === 'sent' ? 'nb-status-ok'
                        : row.status === 'failed' ? 'nb-status-err'
                        : 'nb-status-skip';
      const ccStr = row.cc_emails && row.cc_emails.length ? ` · CC ${row.cc_emails.join(', ')}` : '';

      const card = document.createElement('div');
      card.className = 'nb-card';
      card.innerHTML = `
        <div class="nb-card-icon">${icon}</div>
        <div class="nb-card-main">
          <div class="nb-card-kind">${kindLabel}</div>
          <div class="nb-card-subject">${escapeHtml(subject)}</div>
          <div class="nb-card-meta">
            <span class="nb-card-recipient">→ ${escapeHtml(row.recipient_email)}${escapeHtml(ccStr)}</span>
            <span class="${statusClass}">${timeStr}</span>
            ${row.error_message ? `<span class="nb-status-err">${escapeHtml(row.error_message)}</span>` : ''}
          </div>
        </div>
        <div class="nb-card-actions"></div>
      `;
      const actions = card.querySelector('.nb-card-actions');

      if (isQueued) {
        const sendBtn = mkBtn('Send now', 'primary');
        sendBtn.addEventListener('click', async () => {
          sendBtn.disabled = true; sendBtn.textContent = 'Sending…';
          const { error } = await supa.rpc('notification_send_now', { p_queue_id: row.id });
          if (error) { alert('Send failed: ' + error.message); sendBtn.disabled = false; sendBtn.textContent = 'Send now'; }
          else { card.style.opacity = '0.4'; setTimeout(load, 800); }
        });
        const rescheduleBtn = mkBtn('Reschedule');
        rescheduleBtn.addEventListener('click', () => toggleReschedule(card, row));
        const cancelBtn = mkBtn('Cancel', 'danger');
        cancelBtn.addEventListener('click', async () => {
          if (!confirm(`Cancel this ${kindLabel.toLowerCase()} notification?`)) return;
          const { error } = await supa.rpc('notification_cancel', { p_queue_id: row.id, p_reason: 'cancelled by designer' });
          if (error) alert('Cancel failed: ' + error.message); else load();
        });
        actions.append(sendBtn, rescheduleBtn, cancelBtn);
      }
      return card;
    }

    function mkBtn(label, variant) {
      const b = document.createElement('button');
      b.className = 'nb-btn' + (variant ? ' ' + variant : '');
      b.textContent = label;
      return b;
    }

    function toggleReschedule(card, row) {
      const existing = card.parentElement.querySelector('.nb-reschedule-form');
      if (existing && existing.dataset.rowId === row.id) { existing.remove(); return; }
      if (existing) existing.remove();
      const form = document.createElement('div');
      form.className = 'nb-reschedule-form';
      form.dataset.rowId = row.id;
      const localIso = new Date(Date.now() + 3600*1000).toISOString().slice(0,16);
      form.innerHTML = `
        <label>New time: <input type="datetime-local" value="${localIso}"></label>
        <button class="nb-btn primary">Set</button>
        <button class="nb-btn">Close</button>
      `;
      const [input] = form.querySelectorAll('input');
      const [setBtn, closeBtn] = form.querySelectorAll('button');
      setBtn.addEventListener('click', async () => {
        const newTime = new Date(input.value).toISOString();
        const { error } = await supa.rpc('notification_reschedule', { p_queue_id: row.id, p_new_time: newTime });
        if (error) alert('Reschedule failed: ' + error.message); else load();
      });
      closeBtn.addEventListener('click', () => form.remove());
      card.after(form);
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    async function load() {
      const { data: queued } = await supa.from('notification_queue').select('*').eq('status', 'queued').order('scheduled_for', { ascending: true });
      const { data: recent } = await supa.from('notification_queue').select('*').neq('status', 'queued').order('created_at', { ascending: false }).limit(60);

      const listQ = shell.querySelector('#list-queued');
      const listR = shell.querySelector('#list-recent');
      shell.querySelector('#count-queued').textContent = (queued || []).length;
      shell.querySelector('#count-recent').textContent = (recent || []).length;

      listQ.innerHTML = '';
      if (!queued || queued.length === 0) {
        listQ.innerHTML = '<div class="nb-empty">No notifications queued. New events fire automatically.</div>';
      } else {
        queued.forEach(row => listQ.appendChild(renderCard(row, true)));
      }

      listR.innerHTML = '';
      if (!recent || recent.length === 0) {
        listR.innerHTML = '<div class="nb-empty">No history yet.</div>';
      } else {
        recent.forEach(row => listR.appendChild(renderCard(row, false)));
      }
    }

    await load();
    setInterval(load, 30000);
  </script>
</body>
</html>
