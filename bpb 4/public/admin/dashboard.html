<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipeline Dashboard · Paver Portal Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Onest', system-ui, -apple-system, sans-serif;
      background: #faf8f3;
      color: #58595b;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .dash-header {
      background: white;
      border-bottom: 1px solid #e7e4dc;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .dash-header-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .dash-title {
      font-size: 28px;
      font-weight: 700;
      color: #2d2e2f;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .dash-subtitle {
      font-size: 14px;
      color: #8a8b8d;
      margin: 0;
    }
    .dash-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .dash-last-updated {
      font-size: 12px; color: #8a8b8d;
      font-family: 'JetBrains Mono', monospace;
    }
    .dash-btn {
      background: #9c7440; color: white; border: none;
      padding: 10px 18px; border-radius: 6px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s ease; display: inline-block;
    }
    .dash-btn:hover { background: #4d6c58; }
    .dash-btn:disabled { background: #c4c4c4; cursor: not-allowed; }
    .dash-btn-ghost {
      background: transparent; color: #8a8b8d;
      border: 1px solid #d4d2cb; padding: 9px 14px;
    }
    .dash-btn-ghost:hover { background: #f0eee6; color: #58595b; }

    .dash-main {
      max-width: 1240px; margin: 0 auto;
      padding: 28px 32px 60px;
    }
    .dash-status {
      text-align: center; padding: 80px 32px;
      color: #8a8b8d; font-size: 15px;
    }
    .dash-status-error { color: #b73229; }
    .dash-status-error button {
      margin-left: 12px; background: #b73229; color: white;
      border: none; padding: 6px 14px; border-radius: 4px;
      font-family: inherit; cursor: pointer; font-size: 13px;
    }

    .dash-section-title {
      font-size: 13px; font-weight: 700;
      color: #8a8b8d; text-transform: uppercase;
      letter-spacing: 0.08em; margin: 0 0 14px;
    }
    .dash-section { margin-bottom: 36px; }

    /* ── KPI cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }
    .kpi {
      background: white;
      border: 1px solid #e7e4dc;
      border-radius: 12px;
      padding: 20px 22px;
      transition: border-color 0.15s ease;
    }
    .kpi:hover { border-color: #d4d2cb; }
    .kpi-label {
      font-size: 12px; color: #8a8b8d;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin: 0 0 8px;
    }
    .kpi-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 700;
      color: #2d2e2f; letter-spacing: -0.02em;
      margin: 0 0 6px; line-height: 1.1;
    }
    .kpi-sub {
      font-size: 12px; color: #8a8b8d;
      font-family: 'Onest', sans-serif;
    }
    .kpi-sub strong {
      font-family: 'JetBrains Mono', monospace;
      color: #9c7440; font-weight: 700;
    }
    .kpi-accent { border-left: 4px solid #9c7440; }
    .kpi-warn { border-left: 4px solid #c9a227; }

    /* ── Transitions feed ── */
    .feed { display: grid; gap: 10px; }
    .feed-item {
      background: white;
      border: 1px solid #e7e4dc;
      border-radius: 10px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 14px;
      align-items: center;
      transition: all 0.15s ease;
    }
    .feed-item:hover { border-color: #d4d2cb; transform: translateX(2px); }
    .feed-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .feed-icon-hot { background: #fdf3f2; color: #b73229; }
    .feed-icon-cool { background: #eef4fb; color: #4a76a8; }
    .feed-body { min-width: 0; }
    .feed-line1 {
      font-size: 14px; font-weight: 600;
      color: #2d2e2f; margin: 0 0 3px;
    }
    .feed-line2 {
      font-size: 12px; color: #8a8b8d;
      font-family: 'JetBrains Mono', monospace;
    }
    .feed-time {
      font-size: 11px; color: #8a8b8d;
      font-family: 'JetBrains Mono', monospace;
      text-align: right; white-space: nowrap;
    }
    .feed-empty {
      background: white; border: 1px dashed #d4d2cb;
      border-radius: 10px; padding: 24px;
      color: #8a8b8d; font-size: 13px; text-align: center;
    }

    /* ── Designer leaderboard ── */
    .leaderboard {
      background: white;
      border: 1px solid #e7e4dc;
      border-radius: 12px;
      overflow: hidden;
    }
    .lb-row {
      display: grid;
      grid-template-columns: 32px 1.5fr repeat(6, 1fr);
      gap: 12px;
      padding: 14px 22px;
      align-items: center;
      border-bottom: 1px solid #e7e4dc;
      font-size: 13px;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-header {
      background: #f0eee6;
      font-size: 11px; font-weight: 700;
      color: #8a8b8d; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .lb-rank {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700; color: #d4d2cb;
    }
    .lb-name { font-weight: 600; color: #2d2e2f; }
    .lb-role {
      display: block; font-size: 10px; color: #8a8b8d;
      font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .lb-cell {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600; color: #2d2e2f;
    }
    .lb-cell-muted { color: #8a8b8d; font-weight: 500; }
    .lb-delta-up { color: #9c7440; }
    .lb-delta-down { color: #b73229; }
    .lb-delta-flat { color: #8a8b8d; }

    /* ── Biggest movers ── */
    .movers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .mover {
      background: white;
      border: 1px solid #e7e4dc;
      border-left: 4px solid #9c7440;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .mover-delta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px; font-weight: 700;
      color: #9c7440; line-height: 1;
    }
    .mover-client {
      font-size: 14px; font-weight: 600;
      color: #2d2e2f; margin: 6px 0 2px;
    }
    .mover-address { font-size: 12px; color: #8a8b8d; }
    .mover-scores {
      font-size: 11px; color: #8a8b8d;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .lb-row { grid-template-columns: 32px 1fr repeat(3, auto); font-size: 12px; }
      .lb-cell-hide-mobile, .lb-row .lb-cell:nth-child(n+6) { display: none; }
    }
    @media (max-width: 720px) {
      .dash-header-inner { padding: 18px 20px; }
      .dash-main { padding: 18px 20px 60px; }
      .dash-title { font-size: 22px; }
      .kpi-value { font-size: 24px; }
      .feed-item { grid-template-columns: 28px 1fr; gap: 10px; padding: 12px 14px; }
      .feed-time { grid-column: 2; padding-top: 4px; text-align: left; }
    }
  </style>
</head>
<body>
  <header class="dash-header">
    <div class="dash-header-inner">
      <div>
        <h1 class="dash-title">📊 Pipeline Dashboard</h1>
        <p class="dash-subtitle">Master view · auto-refreshes every 60s</p>
      </div>
      <div class="dash-meta">
        <a href="/admin/" class="dash-btn dash-btn-ghost">← Admin</a>
        <a href="/admin/hot-deals.html" class="dash-btn dash-btn-ghost">🔥 Hot Deals</a>
        <span class="dash-last-updated" id="lastUpdated"></span>
        <button class="dash-btn" id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main class="dash-main">
    <div id="loading" class="dash-status">Loading dashboard…</div>
    <div id="error" class="dash-status dash-status-error" style="display:none">
      <span id="errorMsg">Couldn't load.</span>
      <button type="button" id="retryBtn">Retry</button>
    </div>
    <div id="content" style="display:none">

      <section class="dash-section">
        <h2 class="dash-section-title">Pipeline Health</h2>
        <div class="kpi-grid" id="kpiGrid"></div>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Recent State Transitions · last 7 days</h2>
        <div id="transitionsList"></div>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Designer Leaderboard · last 7 days</h2>
        <div class="leaderboard" id="leaderboard"></div>
      </section>

      <section class="dash-section" id="moversSection" style="display:none">
        <h2 class="dash-section-title">Biggest Score Movers · 7 days</h2>
        <div class="movers-grid" id="moversGrid"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import { supa } from './admin-shell.js';

    const REFRESH_INTERVAL_MS = 60_000;
    let refreshTimer = null;

    const $loading = document.getElementById('loading');
    const $error = document.getElementById('error');
    const $errorMsg = document.getElementById('errorMsg');
    const $content = document.getElementById('content');
    const $refreshBtn = document.getElementById('refreshBtn');
    const $retryBtn = document.getElementById('retryBtn');
    const $lastUpdated = document.getElementById('lastUpdated');
    const $kpiGrid = document.getElementById('kpiGrid');
    const $transitionsList = document.getElementById('transitionsList');
    const $leaderboard = document.getElementById('leaderboard');
    const $moversSection = document.getElementById('moversSection');
    const $moversGrid = document.getElementById('moversGrid');

    function showOnly(el) {
      [$loading, $error, $content].forEach(e => { e.style.display = 'none'; });
      el.style.display = el === $content ? 'block' : 'block';
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function formatMoney(n, opts = {}) {
      const num = Number(n || 0);
      return new Intl.NumberFormat('en-US', {
        style: 'currency', currency: 'USD',
        maximumFractionDigits: opts.decimals ?? 0,
        minimumFractionDigits: opts.decimals ?? 0
      }).format(num);
    }

    function formatPct(n) { return (Number(n || 0)).toFixed(1) + '%'; }

    function relativeTime(timestamp) {
      if (!timestamp) return '';
      const ms = Date.now() - new Date(timestamp).getTime();
      const mins = Math.floor(ms / 60_000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 30) return days + 'd ago';
      return Math.floor(days / 30) + 'mo ago';
    }

    function renderKpis(k) {
      $kpiGrid.innerHTML = `
        <div class="kpi kpi-accent">
          <p class="kpi-label">Active Pipeline</p>
          <p class="kpi-value">${formatMoney(k.pipeline_value)}</p>
          <p class="kpi-sub"><strong>${k.active_count}</strong> open proposals</p>
        </div>
        <div class="kpi kpi-accent">
          <p class="kpi-label">Value at Risk</p>
          <p class="kpi-value">${formatMoney(k.value_at_risk)}</p>
          <p class="kpi-sub">Score-weighted expected</p>
        </div>
        <div class="kpi">
          <p class="kpi-label">Signed · 7d</p>
          <p class="kpi-value">${formatMoney(k.signed_week_value)}</p>
          <p class="kpi-sub"><strong>${k.signed_week_count}</strong> deals · ${formatPct(k.conversion_rate_week)} conv</p>
        </div>
        <div class="kpi">
          <p class="kpi-label">Signed · 30d</p>
          <p class="kpi-value">${formatMoney(k.signed_month_value)}</p>
          <p class="kpi-sub"><strong>${k.signed_month_count}</strong> deals · ${formatPct(k.conversion_rate_month)} conv</p>
        </div>
        <div class="kpi">
          <p class="kpi-label">Sent · 7d</p>
          <p class="kpi-value">${k.sent_week}</p>
          <p class="kpi-sub"><strong>${k.sent_month}</strong> in last 30d</p>
        </div>
        <div class="kpi ${k.avg_time_to_sign_days == null ? 'kpi-warn' : ''}">
          <p class="kpi-label">Avg time to sign</p>
          <p class="kpi-value">${k.avg_time_to_sign_days == null ? '—' : k.avg_time_to_sign_days + 'd'}</p>
          <p class="kpi-sub">${k.avg_time_to_sign_days == null ? 'No signed deals yet' : 'Across all signed deals'}</p>
        </div>
      `;
    }

    function renderTransitions(items) {
      if (!items || items.length === 0) {
        $transitionsList.innerHTML = `<div class="feed-empty">No state transitions in the last 7 days. Quiet pipeline.</div>`;
        return;
      }
      $transitionsList.innerHTML = `<div class="feed">${items.map(t => {
        const isHot = t.kind === 'hot_score_crossed';
        const icon = isHot ? '🔥' : '❄';
        const iconClass = isHot ? 'feed-icon-hot' : 'feed-icon-cool';
        const verb = isHot ? 'crossed into HOT' : 'cooled off';
        const detail = isHot
          ? `${t.current_score} (was ${t.prior_score || 0})`
          : `${t.current_score} (peak ${t.prior_score}${t.days_since_peak ? `, ${t.days_since_peak}d ago` : ''})`;
        return `
          <div class="feed-item">
            <div class="feed-icon ${iconClass}">${icon}</div>
            <div class="feed-body">
              <p class="feed-line1">${escapeHtml(t.client_name || '?')} ${verb} on ${escapeHtml(t.project_address || 'no address')}</p>
              <p class="feed-line2">Score ${escapeHtml(detail)} · ${escapeHtml(t.signal || 'engaged')}</p>
            </div>
            <div class="feed-time">${relativeTime(t.at)}</div>
          </div>
        `;
      }).join('')}</div>`;
    }

    function renderLeaderboard(rows) {
      if (!rows || rows.length === 0) {
        $leaderboard.innerHTML = `<div style="padding:24px; text-align:center; color:#8a8b8d; font-size:13px;">No active designers in this period.</div>`;
        return;
      }
      const header = `
        <div class="lb-row lb-header">
          <span></span>
          <span>Designer</span>
          <span>Sent 7d</span>
          <span>Signed</span>
          <span>Revenue</span>
          <span>Conv</span>
          <span>Active</span>
          <span>Stalled</span>
        </div>
      `;
      const body = rows.map((r, i) => {
        const delta = Number(r.delta_vs_prior_week || 0);
        let arrow = '';
        let arrowClass = 'lb-delta-flat';
        if (delta > 0) { arrow = '↑ +' + delta; arrowClass = 'lb-delta-up'; }
        else if (delta < 0) { arrow = '↓ ' + delta; arrowClass = 'lb-delta-down'; }
        return `
          <div class="lb-row">
            <span class="lb-rank">#${i + 1}</span>
            <span class="lb-name">${escapeHtml(r.name)}<span class="lb-role">${escapeHtml(r.role)}</span></span>
            <span class="lb-cell">${r.sent_7d}</span>
            <span class="lb-cell">${r.signed_7d} <span class="${arrowClass}" style="font-size:10px;">${arrow}</span></span>
            <span class="lb-cell">${formatMoney(r.revenue_7d)}</span>
            <span class="lb-cell">${formatPct(r.conversion_rate)}</span>
            <span class="lb-cell-muted lb-cell">${r.active_count}</span>
            <span class="lb-cell-muted lb-cell">${r.stalled_count}</span>
          </div>
        `;
      }).join('');
      $leaderboard.innerHTML = header + body;
    }

    function renderMovers(movers) {
      if (!movers || movers.length === 0) {
        $moversSection.style.display = 'none';
        return;
      }
      $moversGrid.innerHTML = movers.map(m => `
        <div class="mover">
          <p class="mover-delta">+${m.delta}</p>
          <p class="mover-client">${escapeHtml(m.client_name || '?')}</p>
          <p class="mover-address">${escapeHtml(m.project_address || 'no address')}</p>
          <p class="mover-scores">${m.old_score} → ${m.current_score} · ${escapeHtml(m.top_signal || '')}</p>
        </div>
      `).join('');
      $moversSection.style.display = 'block';
    }

    function updateLastUpdated() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      $lastUpdated.textContent = `Updated ${hh}:${mm}`;
    }

    async function load() {
      $refreshBtn.disabled = true;
      try {
        const { data, error } = await supa.rpc('get_master_dashboard');
        if (error) throw error;

        renderKpis(data.kpis || {});
        renderTransitions(data.transitions_feed || []);
        renderLeaderboard(data.designer_leaderboard || []);
        renderMovers(data.biggest_movers || []);

        showOnly($content);
        updateLastUpdated();
      } catch (e) {
        console.error('Dashboard load failed:', e);
        $errorMsg.textContent = `Couldn't load: ${e?.message || e}`;
        showOnly($error);
      } finally {
        $refreshBtn.disabled = false;
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(() => {
        if (!document.hidden) load();
      }, REFRESH_INTERVAL_MS);
    }
    function stopAutoRefresh() {
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    }

    $refreshBtn.addEventListener('click', load);
    $retryBtn.addEventListener('click', load);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) load();
    });

    (async () => {
      try {
        const { data: { user } } = await supa.auth.getUser();
        if (!user) { window.location.href = '/admin/'; return; }
      } catch (e) { console.error('Auth check failed:', e); }
      load();
      startAutoRefresh();
    })();
  </script>
</body>
</html>
