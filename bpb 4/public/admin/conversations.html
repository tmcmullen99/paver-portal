<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversations · Admin · Paver Portal Proposal Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin-shell.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════════
       Conversations · class prefix .conv-
       Two-pane chat layout: thread list left, open thread right.
       Lives inside the standard admin shell — only the .ash-shell padding
       is overridden so the two panes can fill the available height cleanly.
       ═══════════════════════════════════════════════════════════════════ */
    body.conv-body .ash-shell {
      padding: 0;
      max-width: none;
      min-height: 0;
    }

    .conv-page {
      display: flex;
      height: calc(100vh - var(--ash-topbar-height));
      background: #fafafa;
    }

    /* ── Left pane: thread list ─────────────────────────────────────── */
    .conv-list {
      width: 360px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--ash-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .conv-list-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--ash-border);
      flex-shrink: 0;
    }
    .conv-list-eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ash-green);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .conv-list-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--ash-navy);
      margin-bottom: 4px;
      letter-spacing: -0.005em;
    }
    .conv-list-meta {
      font-size: 12px;
      color: var(--ash-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .conv-search {
      width: calc(100% - 32px);
      margin: 12px 16px 0;
      padding: 8px 12px;
      border: 1px solid var(--ash-border);
      border-radius: 6px;
      font: inherit;
      font-size: 13px;
      color: var(--ash-charcoal);
      background: #fafafa;
    }
    .conv-search:focus {
      outline: none;
      border-color: var(--ash-green);
      background: #fff;
    }
    .conv-threads {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 8px 0 80px;
      margin: 0;
    }
    .conv-thread {
      display: block;
      padding: 12px 16px 12px 18px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.1s ease, border-left-color 0.1s ease;
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid var(--ash-border);
    }
    .conv-thread:hover { background: #fafafa; }
    .conv-thread.is-active {
      background: var(--ash-green-soft);
      border-left-color: var(--ash-green);
    }
    .conv-thread.is-unread .conv-thread-name { font-weight: 700; }
    .conv-thread-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 3px;
    }
    .conv-thread-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--ash-navy);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .conv-thread-time {
      font-size: 11px;
      color: var(--ash-muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .conv-thread-project {
      font-size: 12px;
      color: var(--ash-muted);
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .conv-thread-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ash-muted);
      line-height: 1.4;
    }
    .conv-thread-preview-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .conv-thread-preview-text.is-from-designer::before {
      content: 'You: ';
      color: var(--ash-muted);
      font-style: italic;
    }
    .conv-thread-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: var(--ash-danger);
      color: #fff;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .conv-thread-tag {
      display: inline-flex;
      padding: 1px 6px;
      background: #fef2f2;
      color: var(--ash-danger);
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: 6px;
      flex-shrink: 0;
    }

    /* ── Right pane: open conversation ──────────────────────────────── */
    .conv-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fafafa;
    }
    .conv-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--ash-muted);
      padding: 40px;
      text-align: center;
    }
    .conv-empty-icon {
      font-size: 48px;
      opacity: 0.4;
      margin-bottom: 8px;
    }
    .conv-empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--ash-charcoal);
    }
    .conv-empty-sub { font-size: 14px; max-width: 360px; }

    .conv-thread-header {
      background: #fff;
      border-bottom: 1px solid var(--ash-border);
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .conv-back-btn {
      display: none;
      background: none;
      border: 1px solid var(--ash-border);
      border-radius: 6px;
      padding: 5px 10px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      color: var(--ash-muted);
    }
    .conv-thread-header-info { min-width: 0; flex: 1; }
    .conv-thread-header-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--ash-navy);
      margin-bottom: 2px;
    }
    .conv-thread-header-meta {
      font-size: 12px;
      color: var(--ash-muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: baseline;
    }
    .conv-thread-header-meta a {
      color: var(--ash-green-dark);
      text-decoration: none;
    }
    .conv-thread-header-meta a:hover { text-decoration: underline; }
    .conv-status-tag {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .conv-status-tag.is-no-account { background: #fef2f2; color: var(--ash-danger); }
    .conv-status-tag.is-active { background: var(--ash-green-soft); color: var(--ash-green-dark); }

    .conv-thread-header-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .conv-header-btn {
      padding: 7px 12px;
      background: #fff;
      border: 1px solid var(--ash-border);
      border-radius: 6px;
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--ash-charcoal);
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .conv-header-btn:hover {
      border-color: var(--ash-green);
      color: var(--ash-green-dark);
      background: var(--ash-green-soft);
    }

    /* Messages */
    .conv-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .conv-msg {
      max-width: 70%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .conv-msg.is-from-designer { align-self: flex-end; align-items: flex-end; }
    .conv-msg.is-from-homeowner { align-self: flex-start; align-items: flex-start; }
    .conv-msg-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .conv-msg.is-from-designer .conv-msg-bubble {
      background: var(--ash-green);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .conv-msg.is-from-homeowner .conv-msg-bubble {
      background: #fff;
      color: var(--ash-charcoal);
      border: 1px solid var(--ash-border);
      border-bottom-left-radius: 4px;
    }
    .conv-msg.is-optimistic .conv-msg-bubble { opacity: 0.6; }
    .conv-msg-meta {
      font-size: 11px;
      color: var(--ash-muted);
      padding: 0 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Composer */
    .conv-composer {
      background: #fff;
      border-top: 1px solid var(--ash-border);
      padding: 14px 20px 20px;
      flex-shrink: 0;
    }
    .conv-composer-warn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--ash-warn-soft);
      color: var(--ash-warn-text);
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .conv-composer-warn.is-visible { display: flex; }
    .conv-composer-warn-icon { font-size: 14px; }
    .conv-composer-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .conv-composer-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--ash-border);
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      color: var(--ash-charcoal);
      background: #fff;
      resize: vertical;
      min-height: 48px;
      max-height: 200px;
      line-height: 1.45;
    }
    .conv-composer-input:focus {
      outline: none;
      border-color: var(--ash-green);
      box-shadow: 0 0 0 3px var(--ash-green-soft);
    }
    .conv-composer-send {
      padding: 10px 22px;
      background: var(--ash-green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      align-self: stretch;
    }
    .conv-composer-send:hover:not(:disabled) { background: var(--ash-green-dark); }
    .conv-composer-send:disabled { background: #a8b5ac; cursor: not-allowed; }
    .conv-composer-hint {
      margin-top: 6px;
      font-size: 11px;
      color: var(--ash-muted-soft, #999);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Toast */
    .conv-toast {
      position: fixed;
      bottom: 20px;
      right: 24px;
      padding: 12px 16px;
      background: var(--ash-charcoal);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s ease;
      z-index: 1000;
      pointer-events: none;
      max-width: 360px;
    }
    .conv-toast.is-visible { opacity: 1; transform: translateY(0); }
    .conv-toast.is-success { background: #167d3a; }
    .conv-toast.is-error { background: var(--ash-danger); }

    /* Spinner */
    .conv-spinner-row {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--ash-muted);
      font-size: 14px;
    }
    .conv-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--ash-border);
      border-top-color: var(--ash-green);
      border-radius: 50%;
      animation: conv-spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes conv-spin { to { transform: rotate(360deg); } }

    /* Empty state in thread list */
    .conv-empty-list {
      padding: 40px 20px;
      text-align: center;
      color: var(--ash-muted);
      font-size: 13px;
      font-style: italic;
    }

    /* Mobile — single-pane mode */
    @media (max-width: 900px) {
      .conv-page { display: block; height: auto; }
      .conv-list {
        width: 100%;
        height: calc(100vh - var(--ash-topbar-height));
      }
      .conv-pane {
        position: fixed;
        top: var(--ash-topbar-height);
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 60;
        background: #fafafa;
        transform: translateX(100%);
        transition: transform 0.2s ease;
      }
      .conv-pane.is-open { transform: translateX(0); }
      .conv-back-btn { display: inline-flex; align-items: center; }
      .conv-thread-header { padding: 14px 18px; }
      .conv-messages { padding: 18px; }
      .conv-composer { padding: 12px 16px 18px; }
      .conv-msg { max-width: 85%; }
    }
  </style>
</head>
<body class="conv-body">

<header class="ash-topbar">
  <div class="ash-topbar-inner">
    <a href="/admin/" class="ash-brand">
      <span class="ash-brand-bayside">Paver Portal Proposal Builder</span>
      <span class="ash-brand-divider">/</span>
      <span class="ash-brand-section">Admin</span>
    </a>
    <div class="ash-topbar-right">
      <span class="ash-role-badge is-loading" id="ashRoleBadge">…</span>
      <span class="ash-user-email" id="ashUserEmail"></span>
      <a class="ash-link-back" href="/dashboard">← Editor</a>
      <button class="ash-signout" id="ashSignOutBtn" type="button">Sign out</button>
    </div>
  </div>
</header>
<nav class="ash-tabs" id="ashTabs" aria-label="Admin sections"></nav>

<main class="ash-shell">
  <div class="conv-page">
    <aside class="conv-list">
      <header class="conv-list-header">
        <div class="conv-list-eyebrow">CLIENT CONVERSATIONS</div>
        <h1 class="conv-list-title">Conversations</h1>
        <div class="conv-list-meta" id="convListMeta">Loading…</div>
      </header>
      <input
        type="text"
        class="conv-search"
        id="convSearch"
        placeholder="Filter by name, email, or project…"
        autocomplete="off"
        spellcheck="false">
      <ul class="conv-threads" id="convThreads">
        <li class="conv-spinner-row"><span class="conv-spinner"></span>Loading threads…</li>
      </ul>
    </aside>

    <section class="conv-pane" id="convPane">
      <div class="conv-empty" id="convEmpty">
        <div class="conv-empty-icon">💬</div>
        <div class="conv-empty-title">Select a conversation</div>
        <div class="conv-empty-sub">Pick a thread on the left to read history and reply. Replies to clients who haven't set up their account auto-email them with a sign-in link.</div>
      </div>
    </section>
  </div>
</main>

<div id="convToast" class="conv-toast"></div>

<script type="module" src="/admin/admin-shell.js"></script>
<script type="module">
  import { requireDesigner } from '/js/auth-util.js';
  import { openQuickNoteModal } from '/admin/notes-modal.js';

  // ─────────────────────────────────────────────────────────────────────
  // Boot — auth + state
  // ─────────────────────────────────────────────────────────────────────
  const auth = await requireDesigner();
  if (!auth) {
    // requireDesigner has already redirected — nothing to do.
  } else {
    const SENDER_USER_ID = auth.user.id;
    const SENDER_ROLE = auth.profile && auth.profile.role === 'master' ? 'master' : 'designer';

    const LIST_REFRESH_MS = 60000;

    const state = {
      threads: [],
      filter: '',
      openClientId: null,
      currentThread: null,
    };

    // DOM
    const $ = (s) => document.querySelector(s);
    const elList     = $('#convThreads');
    const elMeta     = $('#convListMeta');
    const elSearch   = $('#convSearch');
    const elPane     = $('#convPane');
    const elEmpty    = $('#convEmpty');
    const elToast    = $('#convToast');

    // ─────────────────────────────────────────────────────────────────
    // Utilities
    // ─────────────────────────────────────────────────────────────────
    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function timeAgo(iso) {
      if (!iso) return '—';
      const then = new Date(iso).getTime();
      const seconds = Math.floor((Date.now() - then) / 1000);
      if (seconds < 60)     return seconds + 's';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60)    return minutes + 'm';
      const hours = Math.floor(minutes / 60);
      if (hours < 24)      return hours + 'h';
      const days = Math.floor(hours / 24);
      if (days < 30)       return days + 'd';
      const months = Math.floor(days / 30);
      if (months < 12)     return months + 'mo';
      return Math.floor(months / 12) + 'y';
    }
    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const opts = { hour: 'numeric', minute: '2-digit', month: 'short', day: 'numeric' };
      return d.toLocaleString('en-US', opts);
    }
    function fmtMoney(n) {
      if (n == null) return '';
      return '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
    }
    function truncate(s, max) {
      if (!s) return '';
      s = String(s).replace(/\s+/g, ' ').trim();
      return s.length > max ? s.slice(0, max - 1) + '…' : s;
    }
    function toast(msg, kind) {
      elToast.textContent = msg;
      elToast.className = 'conv-toast is-visible' + (kind ? ' is-' + kind : '');
      setTimeout(() => { elToast.className = 'conv-toast'; }, 3200);
    }

    // ─────────────────────────────────────────────────────────────────
    // Thread list
    // ─────────────────────────────────────────────────────────────────
    async function loadThreads(opts = {}) {
      try {
        const resp = await fetch('/api/admin-conversations', { cache: 'no-store' });
        if (!resp.ok) {
          const errBody = await resp.json().catch(() => ({}));
          elMeta.textContent = 'Error loading threads';
          if (!opts.silent) toast('Could not load threads: ' + (errBody.error || resp.status), 'error');
          return;
        }
        const data = await resp.json();
        state.threads = data.threads || [];
        renderThreadList();
      } catch (e) {
        elMeta.textContent = 'Network error';
        if (!opts.silent) toast('Network error: ' + (e.message || e), 'error');
      }
    }

    function renderThreadList() {
      const filtered = applyFilter(state.threads, state.filter);
      const unreadTotal = state.threads.reduce((sum, t) => sum + (t.unread_count || 0), 0);
      elMeta.textContent = `${state.threads.length} thread${state.threads.length === 1 ? '' : 's'} · ${unreadTotal} unread`;

      if (filtered.length === 0) {
        elList.innerHTML = `<li class="conv-empty-list">${state.filter ? 'No matches.' : 'No threads yet.'}</li>`;
        return;
      }

      elList.innerHTML = filtered.map(t => renderThreadItem(t)).join('');
      // Wire click handlers
      elList.querySelectorAll('[data-thread-id]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          openThread(el.getAttribute('data-thread-id'));
        });
      });
    }

    function renderThreadItem(t) {
      const isUnread = (t.unread_count || 0) > 0;
      const lastMsg  = t.last_message || null;
      const isFromDesigner = lastMsg && ['master', 'designer'].includes(lastMsg.sender_role);
      const proj = t.latest_proposal || {};
      const projLine = proj.project_address
        ? esc(proj.project_address) + (proj.bid_total_amount != null ? ` · ${fmtMoney(proj.bid_total_amount)}` : '')
        : '';
      const isActive = t.client_id === state.openClientId;
      const needsAccount = !t.account_setup_at;
      const lastWhen = lastMsg ? timeAgo(lastMsg.created_at) : timeAgo(t.client_created_at);
      const previewText = lastMsg
        ? truncate(lastMsg.body || '(empty message)', 80)
        : '(no messages yet)';

      return `
        <li>
          <a href="?client_id=${esc(t.client_id)}"
             class="conv-thread${isActive ? ' is-active' : ''}${isUnread ? ' is-unread' : ''}"
             data-thread-id="${esc(t.client_id)}">
            <div class="conv-thread-top">
              <span class="conv-thread-name">${esc(t.client_name || 'Unknown')}</span>
              <span class="conv-thread-time">${esc(lastWhen)}</span>
            </div>
            ${projLine ? `<div class="conv-thread-project">${projLine}</div>` : ''}
            <div class="conv-thread-preview">
              <span class="conv-thread-preview-text${isFromDesigner ? ' is-from-designer' : ''}">${esc(previewText)}</span>
              ${needsAccount ? '<span class="conv-thread-tag">No account</span>' : ''}
              ${isUnread ? `<span class="conv-thread-badge">${t.unread_count}</span>` : ''}
            </div>
          </a>
        </li>
      `;
    }

    function applyFilter(threads, q) {
      if (!q) return threads;
      const needle = q.toLowerCase();
      return threads.filter(t => {
        const hay = [
          t.client_name,
          t.client_email,
          (t.latest_proposal && t.latest_proposal.project_address) || '',
          (t.last_message && t.last_message.body) || '',
        ].join(' ').toLowerCase();
        return hay.indexOf(needle) !== -1;
      });
    }

    elSearch.addEventListener('input', (e) => {
      state.filter = e.target.value.trim();
      renderThreadList();
    });

    // ─────────────────────────────────────────────────────────────────
    // Open thread
    // ─────────────────────────────────────────────────────────────────
    async function openThread(clientId) {
      state.openClientId = clientId;

      // Update URL without reload
      const url = new URL(window.location.href);
      url.searchParams.set('client_id', clientId);
      window.history.replaceState({}, '', url);

      renderThreadList(); // re-render to update is-active highlight

      // Show pane (mobile)
      elPane.classList.add('is-open');
      elPane.innerHTML = `<div class="conv-spinner-row"><span class="conv-spinner"></span>Loading conversation…</div>`;

      try {
        const resp = await fetch(`/api/admin-conversation-thread?client_id=${encodeURIComponent(clientId)}`, { cache: 'no-store' });
        if (!resp.ok) {
          const errBody = await resp.json().catch(() => ({}));
          elPane.innerHTML = `<div class="conv-empty">
            <div class="conv-empty-icon">⚠</div>
            <div class="conv-empty-title">Couldn't load thread</div>
            <div class="conv-empty-sub">${esc(errBody.error || ('HTTP ' + resp.status))}</div>
          </div>`;
          return;
        }
        const data = await resp.json();
        state.currentThread = data;
        renderThread(data);
      } catch (e) {
        elPane.innerHTML = `<div class="conv-empty">
          <div class="conv-empty-icon">⚠</div>
          <div class="conv-empty-title">Network error</div>
          <div class="conv-empty-sub">${esc(e.message || String(e))}</div>
        </div>`;
      }
    }

    function renderThread(data) {
      const c = data.client || {};
      const proposal = data.latest_proposal || null;
      const messages = data.messages || [];
      const needsAccount = !c.account_setup_at;
      const proposalUrl = proposal && proposal.slug ? `/p/${encodeURIComponent(proposal.slug)}` : null;
      const editorUrl = proposal && proposal.id ? `/editor?id=${encodeURIComponent(proposal.id)}` : null;

      const headerMetaParts = [];
      headerMetaParts.push(`<span>${esc(c.email || '')}</span>`);
      if (c.phone) headerMetaParts.push(`<span>${esc(fmtPhone(c.phone))}</span>`);
      headerMetaParts.push(
        needsAccount
          ? '<span class="conv-status-tag is-no-account">No account</span>'
          : '<span class="conv-status-tag is-active">Active</span>'
      );

      const proposalLine = proposal
        ? `<div class="conv-thread-header-meta" style="margin-top:4px;">
            <span><strong style="color:var(--ash-charcoal);">${esc(proposal.project_address || '—')}</strong></span>
            ${proposal.bid_total_amount != null ? `<span>${fmtMoney(proposal.bid_total_amount)}</span>` : ''}
            ${proposal.published_at ? `<span>Published ${timeAgo(proposal.published_at)} ago</span>` : ''}
            ${proposal.latest_version ? `<span>v${proposal.latest_version}</span>` : ''}
          </div>`
        : '';

      const headerActions = [];
      headerActions.push(`<a class="conv-header-btn" href="/admin/client.html?id=${esc(c.id)}">👤 Client profile</a>`);
      headerActions.push(`<button class="conv-header-btn" data-action="quick-note" data-client-id="${esc(c.id)}" data-client-name="${esc(c.name || 'client')}">📝 Note</button>`);
      if (proposalUrl) headerActions.push(`<a class="conv-header-btn" href="${esc(proposalUrl)}" target="_blank" rel="noopener">View public proposal</a>`);
      if (editorUrl)   headerActions.push(`<a class="conv-header-btn" href="${esc(editorUrl)}" target="_blank" rel="noopener">Open editor</a>`);

      const messagesHtml = messages.length === 0
        ? `<div class="conv-empty" style="flex:1;">
            <div class="conv-empty-icon">✉</div>
            <div class="conv-empty-title">No messages yet</div>
            <div class="conv-empty-sub">Write the first message below. ${needsAccount ? 'Since they haven\'t set up their account, your message will also be emailed.' : ''}</div>
          </div>`
        : messages.map(m => renderMessage(m)).join('');

      elPane.innerHTML = `
        <header class="conv-thread-header">
          <button class="conv-back-btn" id="convBackBtn" aria-label="Back to thread list">← Threads</button>
          <div class="conv-thread-header-info">
            <div class="conv-thread-header-name">${esc(c.name || 'Unknown')}</div>
            <div class="conv-thread-header-meta">${headerMetaParts.join('')}</div>
            ${proposalLine}
          </div>
          <div class="conv-thread-header-actions">${headerActions.join('')}</div>
        </header>

        <div class="conv-messages" id="convMessages">${messagesHtml}</div>

        <div class="conv-composer">
          <div class="conv-composer-warn ${needsAccount ? 'is-visible' : ''}">
            <span class="conv-composer-warn-icon">📧</span>
            <span>This client hasn't set up their account — your reply will also be emailed to them with a magic-link sign-in.</span>
          </div>
          <div class="conv-composer-box">
            <textarea
              id="convReplyBody"
              class="conv-composer-input"
              placeholder="Type your message…"
              rows="1"
              maxlength="5000"></textarea>
            <button id="convReplySend" class="conv-composer-send" type="button">Send</button>
          </div>
          <div class="conv-composer-hint">⌘ + Enter to send</div>
        </div>
      `;

      // Wire up
      document.getElementById('convBackBtn').addEventListener('click', () => {
        elPane.classList.remove('is-open');
        state.openClientId = null;
        const url = new URL(window.location.href);
        url.searchParams.delete('client_id');
        window.history.replaceState({}, '', url);
        renderThreadList();
      });

      const replyTextarea = document.getElementById('convReplyBody');
      const replySendBtn  = document.getElementById('convReplySend');

      // Auto-resize textarea
      replyTextarea.addEventListener('input', () => {
        replyTextarea.style.height = 'auto';
        replyTextarea.style.height = Math.min(replyTextarea.scrollHeight, 200) + 'px';
      });

      // Cmd+Enter to send
      replyTextarea.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
          e.preventDefault();
          sendReply();
        }
      });

      replySendBtn.addEventListener('click', sendReply);

      // Scroll to bottom
      scrollMessagesToBottom();
      // Focus composer
      setTimeout(() => replyTextarea.focus(), 100);
    }

    function renderMessage(m) {
      const isFromDesigner = ['master', 'designer'].includes(m.sender_role);
      const isOptimistic = m.id === '__optimistic__';
      const cls = 'conv-msg ' + (isFromDesigner ? 'is-from-designer' : 'is-from-homeowner') + (isOptimistic ? ' is-optimistic' : '');
      return `
        <div class="${cls}" data-msg-id="${esc(m.id)}">
          <div class="conv-msg-bubble">${esc(m.body || '(empty)')}</div>
          <div class="conv-msg-meta">${esc(fmtTime(m.created_at))}${isOptimistic ? ' · sending…' : ''}</div>
        </div>
      `;
    }

    function scrollMessagesToBottom() {
      const msgsEl = document.getElementById('convMessages');
      if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function fmtPhone(s) {
      if (!s) return '';
      const d = String(s).replace(/\D/g, '');
      if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
      if (d.length === 11) return `+${d[0]} (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
      return s;
    }

    // ─────────────────────────────────────────────────────────────────
    // Send reply
    // ─────────────────────────────────────────────────────────────────
    async function sendReply() {
      const textarea = document.getElementById('convReplyBody');
      const sendBtn  = document.getElementById('convReplySend');
      if (!textarea || !state.openClientId) return;

      const body = textarea.value.trim();
      if (!body) return;

      // Optimistic append
      const optimistic = {
        id: '__optimistic__',
        body,
        created_at: new Date().toISOString(),
        sender_role: SENDER_ROLE,
        sender_user_id: SENDER_USER_ID,
      };
      appendOptimisticMessage(optimistic);

      textarea.value = '';
      textarea.style.height = 'auto';
      textarea.disabled = true;
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';

      try {
        const resp = await fetch('/api/send-chat-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            client_id: state.openClientId,
            sender_user_id: SENDER_USER_ID,
            body,
            sender_role: SENDER_ROLE,
          }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          removeOptimisticMessage();
          textarea.value = body;
          toast(`Send failed: ${data.error || resp.status}`, 'error');
          return;
        }

        const successMsg = data.email_sent
          ? '✓ Sent and emailed (client has no account)'
          : '✓ Sent';
        toast(successMsg, 'success');

        // Re-fetch thread to get the real persisted message (replaces optimistic)
        // and refresh the list to update sort order + previews
        await openThread(state.openClientId);
        loadThreads({ silent: true });
      } catch (e) {
        removeOptimisticMessage();
        textarea.value = body;
        toast('Network error: ' + (e.message || e), 'error');
      } finally {
        textarea.disabled = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
        textarea.focus();
      }
    }

    function appendOptimisticMessage(m) {
      const msgsEl = document.getElementById('convMessages');
      if (!msgsEl) return;
      // If empty state was showing, clear it
      if (msgsEl.querySelector('.conv-empty')) msgsEl.innerHTML = '';
      msgsEl.insertAdjacentHTML('beforeend', renderMessage(m));
      scrollMessagesToBottom();
    }
    function removeOptimisticMessage() {
      const el = document.querySelector('[data-msg-id="__optimistic__"]');
      if (el) el.remove();
    }

    // ─────────────────────────────────────────────────────────────────
    // Boot sequence
    // ─────────────────────────────────────────────────────────────────
    await loadThreads();

    // If URL has ?client_id=, open that thread automatically
    const urlClient = new URLSearchParams(window.location.search).get('client_id');
    if (urlClient) {
      openThread(urlClient);
    }

    // Refresh thread list every minute
    setInterval(() => loadThreads({ silent: true }), LIST_REFRESH_MS);

    // Sprint 14 — quick-note button delegation (thread header)
    document.body.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action="quick-note"]');
      if (!btn) return;
      e.preventDefault();
      const clientId   = btn.getAttribute('data-client-id');
      const clientName = btn.getAttribute('data-client-name') || 'Client';
      if (!clientId) return;
      openQuickNoteModal({
        clientId,
        clientName,
        createdBy: SENDER_USER_ID,
      });
    });
  }
</script>

</body>
</html>
