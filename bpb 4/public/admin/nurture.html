<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nurture admin · Paver Portal Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bp-green: #9c7440;
      --bp-green-dark: #7d5c31;
      --bp-charcoal: #353535;
      --bp-navy: #33281c;
      --bp-cream: #faf8f3;
      --bp-border: #e8e8e3;
      --bp-amber: #c89346;
      --bp-red: #c0392b;
    }
    body { margin:0; background:var(--bp-cream); font-family:'Onest',system-ui,sans-serif; color:var(--bp-charcoal); }
    .nu-shell { max-width:1100px; margin:0 auto; padding:24px 24px 80px; }

    .nu-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:18px; gap:24px; flex-wrap:wrap; }
    .nu-eyebrow { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--bp-green); font-weight:700; margin-bottom:4px; }
    .nu-title { font-size:24px; font-weight:600; color:var(--bp-navy); letter-spacing:-0.005em; margin:0 0 4px; }
    .nu-sub { font-size:14px; color:#777; margin:0; }

    .nu-stats { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:20px; }
    .nu-stat { background:#fff; border:1px solid var(--bp-border); border-radius:8px; padding:11px 14px; }
    .nu-stat-label { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:#999; font-weight:600; margin-bottom:5px; }
    .nu-stat-value { font-size:20px; font-weight:700; color:var(--bp-navy); line-height:1; }
    .nu-stat-value.dim { color:#aaa; }
    .nu-stat-value.bad { color:var(--bp-red); }

    .nu-tabs { display:flex; gap:0; border-bottom:1px solid var(--bp-border); margin-bottom:18px; }
    .nu-tab {
      padding:10px 18px; font-size:14px; font-weight:600; color:#999; cursor:pointer;
      border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none;
      font-family:inherit; transition:color .15s ease, border-color .15s ease;
    }
    .nu-tab:hover { color:var(--bp-charcoal); }
    .nu-tab.active { color:var(--bp-navy); border-bottom-color:var(--bp-green); }
    .nu-tab .nu-tab-count { display:inline-block; background:#eee; color:#777; padding:1px 6px; border-radius:999px; font-size:11px; margin-left:5px; font-weight:600; }
    .nu-tab.active .nu-tab-count { background:var(--bp-green); color:#fff; }

    .nu-panel { display:none; }
    .nu-panel.active { display:block; }

    /* Recent sends table */
    .nu-table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--bp-border); border-radius:8px; overflow:hidden; }
    .nu-table thead th { font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#999; font-weight:600; text-align:left; padding:10px 14px; border-bottom:1px solid var(--bp-border); background:#fafafa; }
    .nu-table tbody td { padding:11px 14px; border-bottom:1px solid var(--bp-border); font-size:13px; vertical-align:middle; }
    .nu-table tbody tr:last-child td { border-bottom:none; }
    .nu-table .nu-cell-time { color:#999; font-family:'Menlo','Monaco',monospace; font-size:11px; white-space:nowrap; }
    .nu-table .nu-cell-client { font-weight:600; color:var(--bp-navy); }
    .nu-table .nu-cell-meta { color:#777; font-size:12px; }
    .nu-pill { display:inline-block; padding:1px 7px; border-radius:999px; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; }
    .nu-pill.sent { background:#eef3ef; color:var(--bp-green); }
    .nu-pill.failed { background:#fdecea; color:var(--bp-red); }
    .nu-pill.skipped { background:#f3eee9; color:var(--bp-amber); }
    .nu-pill.step { background:#33281c; color:#fff; }

    /* Active clients */
    .nu-client-row { background:#fff; border:1px solid var(--bp-border); border-radius:8px; padding:12px 16px; margin-bottom:8px; display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; }
    .nu-client-info .nu-client-name { font-size:15px; font-weight:600; color:var(--bp-navy); margin-bottom:3px; }
    .nu-client-info .nu-client-detail { font-size:12px; color:#777; }
    .nu-client-info .nu-client-detail strong { color:var(--bp-charcoal); }
    .nu-phase-pill { display:inline-block; padding:1px 7px; border-radius:999px; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; }
    .nu-phase-pill.post_review { background:#eef3ef; color:var(--bp-green); }
    .nu-phase-pill.cooling { background:#f3eee9; color:var(--bp-amber); }
    .nu-paused-pill { background:#e8e9ec; color:#666; }
    .nu-opted-pill { background:#fdecea; color:var(--bp-red); }
    .nu-actions { display:flex; gap:6px; }
    .nu-btn {
      padding:6px 11px; border-radius:5px; font-size:12px; font-weight:600;
      border:1px solid var(--bp-border); background:#fff; color:var(--bp-charcoal);
      cursor:pointer; font-family:inherit; transition:all .15s ease;
    }
    .nu-btn:hover { background:#f7f7f4; border-color:#d0d0c8; }
    .nu-btn-primary { background:var(--bp-green); color:#fff; border-color:var(--bp-green); }
    .nu-btn-primary:hover { background:var(--bp-green-dark); border-color:var(--bp-green-dark); }
    .nu-btn-danger { color:var(--bp-red); border-color:#f0c2bc; }
    .nu-btn-danger:hover { background:#fdecea; }

    /* Templates */
    .nu-tmpl-card { background:#fff; border:1px solid var(--bp-border); border-radius:8px; padding:18px 20px; margin-bottom:14px; }
    .nu-tmpl-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
    .nu-tmpl-step { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--bp-green); font-weight:700; }
    .nu-tmpl-updated { font-size:11px; color:#999; }
    .nu-tmpl-label { font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:#999; font-weight:600; margin:14px 0 5px; }
    .nu-tmpl-input, .nu-tmpl-textarea {
      width:100%; box-sizing:border-box; padding:10px 12px;
      border:1px solid var(--bp-border); border-radius:6px; background:#fff;
      font-family:inherit; font-size:13px; color:var(--bp-charcoal); line-height:1.55;
    }
    .nu-tmpl-textarea { min-height:200px; font-family:'Menlo','Monaco',monospace; font-size:12px; resize:vertical; }
    .nu-tmpl-input:focus, .nu-tmpl-textarea:focus { outline:none; border-color:var(--bp-green); box-shadow:0 0 0 3px rgba(93,126,105,0.1); }
    .nu-tmpl-help { font-size:11px; color:#999; margin-top:6px; }
    .nu-tmpl-help code { background:#f3eee9; padding:1px 5px; border-radius:3px; color:var(--bp-charcoal); font-family:'Menlo','Monaco',monospace; font-size:10px; }
    .nu-tmpl-save { margin-top:14px; }

    .nu-empty { text-align:center; padding:50px 20px; color:#999; font-style:italic; }
    .nu-loading { text-align:center; padding:40px 0; color:#999; font-size:13px; }

    .nu-toast { position:fixed; top:20px; right:20px; background:#33281c; color:#fff; padding:11px 16px; border-radius:6px; font-size:13px; box-shadow:0 4px 14px rgba(0,0,0,0.15); opacity:0; transform:translateY(-8px); transition:opacity .2s ease, transform .2s ease; pointer-events:none; z-index:100; }
    .nu-toast.show { opacity:1; transform:translateY(0); }
    .nu-toast.error { background:var(--bp-red); }

    @media (max-width:780px) {
      .nu-stats { grid-template-columns:repeat(3,1fr); }
      .nu-table thead { display:none; }
      .nu-table tbody td { display:block; padding:6px 14px; border-bottom:none; }
      .nu-table tbody tr { display:block; border-bottom:1px solid var(--bp-border); padding:10px 0; }
      .nu-client-row { grid-template-columns:1fr; }
      .nu-actions { justify-content:flex-start; }
    }
  </style>
</head>
<body>

<div class="nu-shell">

  <div class="nu-header">
    <div>
      <div class="nu-eyebrow">PAVER PORTAL PORTAL · ADMIN</div>
      <h1 class="nu-title">Nurture sequence</h1>
      <p class="nu-sub">Recent sends, active clients in the funnel, and editable templates.</p>
    </div>
    <div>
      <a href="/admin/today.html" class="nu-btn">← Back to Today</a>
    </div>
  </div>

  <div class="nu-stats" id="stats">
    <div class="nu-loading" style="grid-column:1/-1;">Loading stats…</div>
  </div>

  <div class="nu-tabs">
    <button class="nu-tab active" data-tab="sends">Recent sends<span class="nu-tab-count" id="count-sends">—</span></button>
    <button class="nu-tab" data-tab="clients">Active clients<span class="nu-tab-count" id="count-clients">—</span></button>
    <button class="nu-tab" data-tab="templates">Templates</button>
  </div>

  <div class="nu-panel active" id="panel-sends">
    <div id="sends-body"><div class="nu-loading">Loading…</div></div>
  </div>

  <div class="nu-panel" id="panel-clients">
    <div id="clients-body"><div class="nu-loading">Loading…</div></div>
  </div>

  <div class="nu-panel" id="panel-templates">
    <div id="templates-body"><div class="nu-loading">Loading…</div></div>
  </div>

</div>

<div class="nu-toast" id="toast"></div>

<script type="module">
  import { requireDesigner } from '/admin/admin-shell.js';

  const auth = await requireDesigner();
  if (!auth) throw new Error('not authenticated');

  const ENDPOINT = '/api/admin-nurture-admin';

  // ── Utilities
  const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const $ = (id) => document.getElementById(id);

  function timeAgo(iso) {
    if (!iso) return '—';
    const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (sec < 60) return sec + 's ago';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + 'm ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + 'h ago';
    const day = Math.floor(hr / 24);
    if (day < 30) return day + 'd ago';
    return Math.floor(day / 30) + 'mo ago';
  }

  function toast(message, isError) {
    const el = $('toast');
    el.textContent = message;
    el.classList.toggle('error', !!isError);
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  async function api(action, payload = {}) {
    const resp = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${auth.session.access_token}` },
      body: JSON.stringify({ action, ...payload }),
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok || !data.success) throw new Error(data.error || data.detail || `HTTP ${resp.status}`);
    return data;
  }

  // ── Tabs
  document.querySelectorAll('.nu-tab').forEach((tab) => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nu-tab').forEach((t) => t.classList.toggle('active', t === tab));
      document.querySelectorAll('.nu-panel').forEach((p) => p.classList.toggle('active', p.id === 'panel-' + tab.dataset.tab));
    });
  });

  // ── Loading
  let STATE = null;

  async function loadState() {
    try {
      const data = await api('get_state');
      STATE = data.state;
      renderStats();
      renderSends();
      renderClients();
      renderTemplates();
    } catch (e) {
      toast('Load failed: ' + e.message, true);
    }
  }

  function renderStats() {
    const s = STATE.stats;
    $('stats').innerHTML = `
      <div class="nu-stat"><div class="nu-stat-label">Total sent</div><div class="nu-stat-value ${s.total_sent ? '' : 'dim'}">${s.total_sent}</div></div>
      <div class="nu-stat"><div class="nu-stat-label">Last 7d</div><div class="nu-stat-value ${s.sent_last_7d ? '' : 'dim'}">${s.sent_last_7d}</div></div>
      <div class="nu-stat"><div class="nu-stat-label">Failed 7d</div><div class="nu-stat-value ${s.failed_last_7d ? 'bad' : 'dim'}">${s.failed_last_7d}</div></div>
      <div class="nu-stat"><div class="nu-stat-label">Active</div><div class="nu-stat-value ${s.active_clients ? '' : 'dim'}">${s.active_clients}</div></div>
      <div class="nu-stat"><div class="nu-stat-label">Paused</div><div class="nu-stat-value ${s.paused_clients ? '' : 'dim'}">${s.paused_clients}</div></div>
      <div class="nu-stat"><div class="nu-stat-label">Opted out</div><div class="nu-stat-value ${s.opted_out_clients ? '' : 'dim'}">${s.opted_out_clients}</div></div>
    `;
    $('count-sends').textContent = STATE.recent_sends.length;
    $('count-clients').textContent = STATE.active_clients.length;
  }

  function renderSends() {
    const rows = STATE.recent_sends;
    if (rows.length === 0) {
      $('sends-body').innerHTML = '<div class="nu-empty">No sends yet. They\'ll appear here as the nurture cron fires.</div>';
      return;
    }
    $('sends-body').innerHTML = `
      <table class="nu-table">
        <thead>
          <tr>
            <th>When</th>
            <th>Client</th>
            <th>Step</th>
            <th>Subject</th>
            <th>Status</th>
            <th>Resend ID</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((r) => `
            <tr>
              <td class="nu-cell-time">${timeAgo(r.sent_at)}</td>
              <td>
                <div class="nu-cell-client">${esc(r.client_name || 'Unknown')}</div>
                <div class="nu-cell-meta">${esc(r.project_address || '—')}</div>
              </td>
              <td><span class="nu-pill step">Step ${r.sequence_step}</span></td>
              <td>${esc(r.subject || '—')}</td>
              <td>
                <span class="nu-pill ${r.status}">${r.status}</span>
                ${r.error_message ? `<div class="nu-cell-meta" style="color:#c0392b;margin-top:4px;">${esc(r.error_message.slice(0,80))}</div>` : ''}
              </td>
              <td class="nu-cell-time">${r.resend_id ? esc(r.resend_id.slice(0, 8)) + '…' : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderClients() {
    const rows = STATE.active_clients;
    if (rows.length === 0) {
      $('clients-body').innerHTML = '<div class="nu-empty">No clients currently in nurture phase.</div>';
      return;
    }
    $('clients-body').innerHTML = rows.map((c) => {
      const isPaused = c.nurture_paused_until && new Date(c.nurture_paused_until) > new Date();
      const isOpted = !!c.nurture_opted_out_at;
      const stateBadges = [];
      stateBadges.push(`<span class="nu-phase-pill ${c.phase}">${c.phase.replace('_', ' ')}</span>`);
      if (isPaused) stateBadges.push(`<span class="nu-phase-pill nu-paused-pill">paused until ${new Date(c.nurture_paused_until).toLocaleDateString()}</span>`);
      if (isOpted) stateBadges.push(`<span class="nu-phase-pill nu-opted-pill">opted out</span>`);

      const nextStep = (c.last_step_sent || 0) + 1;
      const canForceSend = !isOpted && nextStep <= 3;

      return `
        <div class="nu-client-row">
          <div class="nu-client-info">
            <div class="nu-client-name">${esc(c.client_name || 'Unknown')} ${stateBadges.join(' ')}</div>
            <div class="nu-client-detail">
              ${esc(c.project_address || '—')} · <strong>${Math.round(c.days_in_phase)}d</strong> in phase
              · ${c.last_step_sent ? `last sent step <strong>${c.last_step_sent}</strong> ${timeAgo(c.last_sent_at)}` : 'no sends yet'}
              · ${esc(c.client_email || 'no email')}
            </div>
          </div>
          <div class="nu-actions">
            <a class="nu-btn" href="/admin/client.html?id=${encodeURIComponent(c.client_id)}">Profile</a>
            ${canForceSend ? `<button class="nu-btn nu-btn-primary" data-action="force_send" data-client="${c.client_id}" data-step="${nextStep}">Send step ${nextStep}</button>` : ''}
            ${isPaused
              ? `<button class="nu-btn" data-action="resume" data-client="${c.client_id}">Resume</button>`
              : (!isOpted ? `<button class="nu-btn" data-action="pause" data-client="${c.client_id}">Pause 7d</button>` : '')}
            ${!isOpted ? `<button class="nu-btn nu-btn-danger" data-action="opt_out" data-client="${c.client_id}">Opt out</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderTemplates() {
    const tmpls = STATE.templates || [];
    if (tmpls.length === 0) {
      $('templates-body').innerHTML = '<div class="nu-empty">No templates configured.</div>';
      return;
    }
    $('templates-body').innerHTML = tmpls.map((t) => `
      <div class="nu-tmpl-card" data-step="${t.sequence_step}">
        <div class="nu-tmpl-header">
          <div class="nu-tmpl-step">STEP ${t.sequence_step}${t.sequence_step === 1 ? ' · 24h after publish' : t.sequence_step === 2 ? ' · 3d after step 1' : ' · 7d after step 2'}</div>
          <div class="nu-tmpl-updated">${t.updated_at ? 'Updated ' + timeAgo(t.updated_at) : 'Default'}</div>
        </div>
        <div class="nu-tmpl-label">Subject</div>
        <input type="text" class="nu-tmpl-input" data-field="subject" value="${esc(t.subject)}">
        <div class="nu-tmpl-label">Paragraphs · one per blank line · placeholders: <code>{first_name}</code> <code>{project_address}</code> <code>{bid_amount_paren}</code> <code>{proposal_url}</code> <code>{unsubscribe_url}</code></div>
        <textarea class="nu-tmpl-textarea" data-field="paragraphs">${esc((t.paragraphs || []).join('\n\n'))}</textarea>
        <div class="nu-tmpl-help">Each blank line separates paragraphs. Bullets start with <code>•</code>.</div>
        <div class="nu-tmpl-save">
          <button class="nu-btn nu-btn-primary" data-action="save_template" data-step="${t.sequence_step}">Save step ${t.sequence_step}</button>
        </div>
      </div>
    `).join('');
  }

  // ── Action handlers (delegated)
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const clientId = btn.dataset.client;
    const step = btn.dataset.step;

    if (action === 'pause') {
      if (!confirm('Pause nurture for 7 days?')) return;
      btn.disabled = true;
      try { await api('pause', { client_id: clientId, days: 7 }); toast('Paused for 7 days'); await loadState(); }
      catch (err) { toast(err.message, true); btn.disabled = false; }
    }
    if (action === 'resume') {
      btn.disabled = true;
      try { await api('resume', { client_id: clientId }); toast('Resumed'); await loadState(); }
      catch (err) { toast(err.message, true); btn.disabled = false; }
    }
    if (action === 'opt_out') {
      if (!confirm('Permanently opt this client out of all nurture emails? (They can be re-added by clearing nurture_opted_out_at.)')) return;
      btn.disabled = true;
      try { await api('opt_out', { client_id: clientId }); toast('Opted out'); await loadState(); }
      catch (err) { toast(err.message, true); btn.disabled = false; }
    }
    if (action === 'force_send') {
      if (!confirm(`Force-send step ${step} now? This will email the client immediately.`)) return;
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try { const r = await api('force_send', { client_id: clientId, step: parseInt(step, 10) }); toast(`Sent · Resend ${r.resend_id?.slice(0,8)}…`); await loadState(); }
      catch (err) { toast(err.message, true); btn.disabled = false; btn.textContent = `Send step ${step}`; }
    }
    if (action === 'save_template') {
      const card = btn.closest('.nu-tmpl-card');
      const subject = card.querySelector('[data-field="subject"]').value.trim();
      const paragraphsRaw = card.querySelector('[data-field="paragraphs"]').value;
      const paragraphs = paragraphsRaw.split(/\n\s*\n/).map((p) => p.trim()).filter(Boolean);
      if (!subject || paragraphs.length === 0) { toast('Subject and at least one paragraph required', true); return; }
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try { await api('save_template', { step: parseInt(step, 10), subject, paragraphs }); toast(`Step ${step} saved`); await loadState(); }
      catch (err) { toast(err.message, true); btn.disabled = false; btn.textContent = `Save step ${step}`; }
    }
  });

  // ── Boot
  loadState();
</script>

</body>
</html>
