<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Today · Admin · Paver Portal Proposal Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin-shell.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════════
       Today dashboard · class prefix .tod-
       ═══════════════════════════════════════════════════════════════════ */

    .tod-greeting {
      margin-bottom: 28px;
    }
    .tod-eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ash-green);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .tod-greeting-title {
      font-size: 30px;
      font-weight: 600;
      color: var(--ash-navy);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .tod-greeting-sub {
      font-size: 15px;
      color: var(--ash-muted);
    }

    /* KPI cards row */
    .tod-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .tod-kpi {
      background: #fff;
      border: 1px solid var(--ash-border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .tod-kpi-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ash-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .tod-kpi-num {
      font-size: 32px;
      font-weight: 700;
      color: var(--ash-navy);
      line-height: 1;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }
    .tod-kpi-num.is-zero { color: var(--ash-muted-soft, #999); font-weight: 400; }
    .tod-kpi-delta {
      font-size: 12px;
      color: var(--ash-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .tod-kpi-delta.is-up    { color: #167d3a; }
    .tod-kpi-delta.is-down  { color: var(--ash-danger); }
    .tod-kpi-delta-arrow {
      display: inline-block;
      margin-right: 3px;
    }

    /* Pipeline strip */
    .tod-pipeline {
      background: var(--ash-navy);
      color: #fff;
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
    }
    .tod-pipeline-cell {
      border-left: 1px solid rgba(255,255,255,0.18);
      padding-left: 24px;
    }
    .tod-pipeline-cell:first-child {
      border-left: none;
      padding-left: 0;
    }
    .tod-pipeline-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .tod-pipeline-value {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .tod-pipeline-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    /* Section block */
    .tod-section {
      margin-bottom: 32px;
    }
    .tod-section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--ash-border);
    }
    .tod-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--ash-charcoal);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .tod-section-title-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      padding: 2px 8px;
      background: var(--ash-danger);
      color: #fff;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 0;
    }
    .tod-section-title-count.is-cool { background: var(--ash-green); }
    .tod-section-meta {
      font-size: 12px;
      color: var(--ash-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Row layout shared across needs-reply and hot-today */
    .tod-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid var(--ash-border);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: border-color 0.15s ease;
    }
    .tod-row:hover { border-color: var(--ash-green); }
    .tod-row-main { min-width: 0; }
    .tod-row-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 15px;
      color: var(--ash-navy);
      margin-bottom: 3px;
      flex-wrap: wrap;
    }
    .tod-row-title strong { font-weight: 600; }
    .tod-row-title em {
      font-style: normal;
      color: var(--ash-muted);
      font-weight: 400;
      font-size: 14px;
    }
    .tod-row-amount {
      font-weight: 700;
      color: var(--ash-green-dark);
      font-size: 15px;
    }
    .tod-row-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--ash-muted);
      flex-wrap: wrap;
    }
    .tod-row-meta strong { color: var(--ash-charcoal); font-weight: 500; }
    .tod-row-note {
      margin-top: 6px;
      padding: 8px 12px;
      background: var(--ash-cream);
      border-left: 3px solid var(--ash-green);
      font-size: 13px;
      color: var(--ash-charcoal);
      border-radius: 4px;
      line-height: 1.5;
      max-height: 70px;
      overflow: hidden;
    }
    .tod-row-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .tod-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      background: #fff;
      border: 1px solid var(--ash-border);
      border-radius: 6px;
      font-family: 'Onest', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ash-charcoal);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .tod-btn:hover {
      border-color: var(--ash-green);
      color: var(--ash-green-dark);
      background: var(--ash-green-soft);
    }
    .tod-btn.is-primary {
      background: var(--ash-green);
      color: #fff;
      border-color: var(--ash-green);
    }
    .tod-btn.is-primary:hover {
      background: var(--ash-green-dark);
      border-color: var(--ash-green-dark);
    }

    .tod-empty {
      padding: 14px 18px;
      background: var(--ash-green-soft);
      border-radius: 8px;
      color: var(--ash-green-dark);
      font-size: 13px;
      text-align: center;
    }

    .tod-loading {
      padding: 80px 20px;
      text-align: center;
      color: var(--ash-muted);
    }
    .tod-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--ash-border);
      border-top-color: var(--ash-green);
      border-radius: 50%;
      animation: tod-spin 0.8s linear infinite;
      vertical-align: -3px;
      margin-right: 8px;
    }
    @keyframes tod-spin { to { transform: rotate(360deg); } }

    .tod-refresh-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--ash-muted-soft, #999);
      font-family: 'JetBrains Mono', monospace;
      align-items: center;
    }
    .tod-refresh-btn {
      padding: 6px 12px;
      background: #fff;
      border: 1px solid var(--ash-border);
      border-radius: 6px;
      font: inherit;
      font-family: 'Onest', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--ash-charcoal);
    }
    .tod-refresh-btn:hover:not(:disabled) {
      border-color: var(--ash-green);
      color: var(--ash-green-dark);
    }
    .tod-refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 760px) {
      .tod-greeting-title { font-size: 24px; }
      .tod-kpi-num { font-size: 26px; }
      .tod-pipeline { gap: 16px; padding: 18px; }
      .tod-pipeline-cell { padding-left: 16px; }
      .tod-pipeline-value { font-size: 22px; }
      .tod-row { grid-template-columns: 1fr; }
      .tod-row-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>

<header class="ash-topbar">
  <div class="ash-topbar-inner">
    <a href="/admin/" class="ash-brand">
      <span class="ash-brand-bayside">Paver Portal Proposal Builder</span>
      <span class="ash-brand-divider">/</span>
      <span class="ash-brand-section">Admin</span>
    </a>
    <div class="ash-topbar-right">
      <span class="ash-role-badge is-loading" id="ashRoleBadge">…</span>
      <span class="ash-user-email" id="ashUserEmail"></span>
      <a class="ash-link-back" href="/dashboard">← Editor</a>
      <button class="ash-signout" id="ashSignOutBtn" type="button">Sign out</button>
    </div>
  </div>
</header>
<nav class="ash-tabs" id="ashTabs" aria-label="Admin sections"></nav>

<main class="ash-shell">
  <div class="tod-greeting">
    <div class="tod-eyebrow" id="todEyebrow">DAILY DASHBOARD</div>
    <h1 class="tod-greeting-title" id="todTitle">Loading…</h1>
    <p class="tod-greeting-sub" id="todSub"></p>
  </div>

  <div class="tod-refresh-row">
    <span id="todLastRefreshed"></span>
    <button id="todRefreshBtn" class="tod-refresh-btn">↻ Refresh</button>
  </div>

  <div id="todContent">
    <div class="tod-loading"><span class="tod-spinner"></span>Loading today's signals…</div>
  </div>
</main>

<script type="module" src="/admin/admin-shell.js"></script>
<script type="module">
  import { requireDesigner } from '/js/auth-util.js';
  import { openQuickNoteModal } from '/admin/notes-modal.js';

  const auth = await requireDesigner();
  if (auth) {
    const greetingName = auth.profile && auth.profile.display_name
      ? auth.profile.display_name.split(' ')[0]
      : 'there';

    const REFRESH_MS = 60000;
    let _lastRefreshedTimer = null;

    const $ = (s) => document.querySelector(s);

    // ─────────────────────────────────────────────────────────────────
    // Utilities
    // ─────────────────────────────────────────────────────────────────
    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function fmtMoney(n, opts = {}) {
      if (n == null) return '—';
      const abbrev = opts.abbrev !== false;
      const v = Number(n);
      if (abbrev && v >= 1000000) return '$' + (v / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (abbrev && v >= 1000)    return '$' + (v / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
      return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 0 });
    }
    function timeAgo(iso) {
      if (!iso) return '—';
      const then = new Date(iso).getTime();
      const seconds = Math.floor((Date.now() - then) / 1000);
      if (seconds < 60)    return seconds + 's ago';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60)    return minutes + 'm ago';
      const hours = Math.floor(minutes / 60);
      if (hours < 24)      return hours + 'h ago';
      const days = Math.floor(hours / 24);
      return days + 'd ago';
    }
    function truncate(s, max) {
      if (!s) return '';
      s = String(s).replace(/\s+/g, ' ').trim();
      return s.length > max ? s.slice(0, max - 1) + '…' : s;
    }
    function deltaPctText(today, yesterday) {
      if (yesterday === 0 && today === 0) return null;
      if (yesterday === 0)                return { dir: 'up', text: `+${today} vs yesterday` };
      const diff = today - yesterday;
      if (diff === 0)                     return { dir: 'flat', text: 'same as yesterday' };
      const dir = diff > 0 ? 'up' : 'down';
      const arrow = diff > 0 ? '↑' : '↓';
      const sign = diff > 0 ? '+' : '';
      return { dir, text: `${arrow} ${sign}${diff} vs yesterday` };
    }
    function deltaDot(today, yesterday) {
      const d = deltaPctText(today, yesterday);
      if (!d) return '';
      return `<div class="tod-kpi-delta is-${d.dir}">${esc(d.text)}</div>`;
    }

    // ─────────────────────────────────────────────────────────────────
    // Render — KPI cards
    // ─────────────────────────────────────────────────────────────────
    function renderKpis(today, yesterday) {
      const cards = [
        { label: 'Proposal views',  today: today.views,            yesterday: yesterday.views },
        { label: 'New lock-ins',    today: today.new_lockins,      yesterday: yesterday.new_lockins },
        { label: 'Inbound messages',today: today.new_inbound_msgs, yesterday: yesterday.new_inbound_msgs },
        { label: 'Design requests', today: (today.new_subs || 0) + (today.new_redesigns || 0),
                                    yesterday: (yesterday.new_subs || 0) + (yesterday.new_redesigns || 0) },
      ];
      return `
        <div class="tod-kpis">
          ${cards.map(c => `
            <div class="tod-kpi">
              <div class="tod-kpi-label">${esc(c.label)}</div>
              <div class="tod-kpi-num${c.today === 0 ? ' is-zero' : ''}">${c.today}</div>
              ${deltaDot(c.today, c.yesterday)}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderPipelineStrip(thisWeek, pipeline) {
      return `
        <div class="tod-pipeline">
          <div class="tod-pipeline-cell">
            <div class="tod-pipeline-label">Active pipeline</div>
            <div class="tod-pipeline-value">${fmtMoney(pipeline.active_value)}</div>
            <div class="tod-pipeline-sub">${pipeline.active_proposals} proposal${pipeline.active_proposals === 1 ? '' : 's'} not yet locked</div>
          </div>
          <div class="tod-pipeline-cell">
            <div class="tod-pipeline-label">This week locked</div>
            <div class="tod-pipeline-value">${fmtMoney(thisWeek.locked_value)}</div>
            <div class="tod-pipeline-sub">${thisWeek.lockins} lock-in${thisWeek.lockins === 1 ? '' : 's'} signed</div>
          </div>
          <div class="tod-pipeline-cell">
            <div class="tod-pipeline-label">Open lock-ins</div>
            <div class="tod-pipeline-value">${pipeline.open_lockins}</div>
            <div class="tod-pipeline-sub">Need to send contract</div>
          </div>
          <div class="tod-pipeline-cell">
            <div class="tod-pipeline-label">This week</div>
            <div class="tod-pipeline-value">${thisWeek.proposals_published}</div>
            <div class="tod-pipeline-sub">proposal${thisWeek.proposals_published === 1 ? '' : 's'} published · ${thisWeek.total_views} total views</div>
          </div>
        </div>
      `;
    }

    function renderNeedsReply(items) {
      if (items.length === 0) {
        return `
          <section class="tod-section">
            <div class="tod-section-header">
              <div class="tod-section-title">Awaiting your reply</div>
              <span class="tod-section-meta">All caught up</span>
            </div>
            <div class="tod-empty">✓ No clients waiting on a response</div>
          </section>
        `;
      }
      const rows = items.map(it => `
        <div class="tod-row">
          <div class="tod-row-main">
            <div class="tod-row-title">
              <strong>${esc(it.client_name || 'Unknown')}</strong>
              ${it.pending_count > 1 ? `<em>${it.pending_count} unanswered messages</em>` : ''}
            </div>
            <div class="tod-row-meta">
              <span><strong>${esc(it.client_email || '')}</strong></span>
              <span>${esc(timeAgo(it.last_inbound_at))}</span>
            </div>
            ${it.last_inbound_body ? `<div class="tod-row-note">${esc(truncate(it.last_inbound_body, 200))}</div>` : ''}
          </div>
          <div class="tod-row-actions">
            <a class="tod-btn" href="/admin/client.html?id=${esc(it.client_id)}">👤 Profile</a>
            <button class="tod-btn" data-action="quick-note" data-client-id="${esc(it.client_id)}" data-client-name="${esc(it.client_name || 'client')}">📝 Note</button>
            <a class="tod-btn is-primary" href="/admin/conversations.html?client_id=${esc(it.client_id)}">Open thread →</a>
          </div>
        </div>
      `).join('');
      return `
        <section class="tod-section">
          <div class="tod-section-header">
            <div class="tod-section-title">
              Awaiting your reply
              <span class="tod-section-title-count">${items.length}</span>
            </div>
            <span class="tod-section-meta">Inbound messages without a designer reply</span>
          </div>
          ${rows}
        </section>
      `;
    }

    function renderHotToday(items) {
      if (items.length === 0) {
        return `
          <section class="tod-section">
            <div class="tod-section-header">
              <div class="tod-section-title">Active in the last 24 hours</div>
              <span class="tod-section-meta">No views today</span>
            </div>
            <div class="tod-empty">No proposal activity in the last 24h.</div>
          </section>
        `;
      }
      const rows = items.map(it => {
        const proposalUrl = it.slug ? `/p/${encodeURIComponent(it.slug)}` : `/editor?id=${encodeURIComponent(it.proposal_id)}`;
        return `
          <div class="tod-row">
            <div class="tod-row-main">
              <div class="tod-row-title">
                <strong>${esc(it.project_address || '—')}</strong>
                ${it.bid_total_amount != null ? `<span class="tod-row-amount">${fmtMoney(it.bid_total_amount)}</span>` : ''}
              </div>
              <div class="tod-row-meta">
                <span><strong>${it.views_today}</strong> views</span>
                <span><strong>${it.sessions_today}</strong> session${it.sessions_today === 1 ? '' : 's'}</span>
                <span>Last view ${timeAgo(it.last_view)}</span>
              </div>
            </div>
            <div class="tod-row-actions">
              <a class="tod-btn is-primary" href="${esc(proposalUrl)}" target="_blank" rel="noopener">View proposal →</a>
            </div>
          </div>
        `;
      }).join('');
      return `
        <section class="tod-section">
          <div class="tod-section-header">
            <div class="tod-section-title">
              Active in the last 24 hours
              <span class="tod-section-title-count is-cool">${items.length}</span>
            </div>
            <span class="tod-section-meta">Top-viewed proposals · clients showing interest</span>
          </div>
          ${rows}
        </section>
      `;
    }

    // ─────────────────────────────────────────────────────────────────
    // Greeting
    // ─────────────────────────────────────────────────────────────────
    function renderGreeting(today, needsReplyCount) {
      const hour = new Date().getHours();
      const partOfDay =
        hour < 5  ? 'late' :
        hour < 12 ? 'morning' :
        hour < 17 ? 'afternoon' : 'evening';

      const greeting = partOfDay === 'late' ? `You're up late, ${greetingName}.`
                     : partOfDay === 'morning' ? `Good morning, ${greetingName}.`
                     : partOfDay === 'afternoon' ? `Good afternoon, ${greetingName}.`
                     : `Good evening, ${greetingName}.`;

      const dayStr = new Date().toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric',
      });

      let attentionLine;
      if (needsReplyCount > 0) {
        attentionLine = `${dayStr} · ${needsReplyCount} client${needsReplyCount === 1 ? '' : 's'} waiting on you.`;
      } else if (today.views > 0) {
        attentionLine = `${dayStr} · ${today.views} view${today.views === 1 ? '' : 's'} on your proposals so far today.`;
      } else {
        attentionLine = `${dayStr} · Quiet so far today.`;
      }

      $('#todTitle').textContent = greeting;
      $('#todSub').textContent = attentionLine;
    }

    // ─────────────────────────────────────────────────────────────────
    // Main load
    // ─────────────────────────────────────────────────────────────────
    async function loadToday() {
      const btn = $('#todRefreshBtn');
      btn.disabled = true;
      btn.textContent = 'Loading…';

      try {
        const resp = await fetch('/api/admin-today', { cache: 'no-store' });
        if (!resp.ok) {
          const errBody = await resp.json().catch(() => ({}));
          renderError(errBody.error || ('HTTP ' + resp.status));
          return;
        }
        const data = await resp.json();
        render(data);
        scheduleLastRefreshedUpdate(data.generated_at || new Date().toISOString());
      } catch (e) {
        renderError(e.message || String(e));
      } finally {
        btn.disabled = false;
        btn.textContent = '↻ Refresh';
      }
    }

    function render(data) {
      const today = data.today || {};
      const yesterday = data.yesterday || {};
      const thisWeek = data.this_week || {};
      const pipeline = data.pipeline || {};
      const needsReply = data.needs_reply || [];
      const hotToday = data.top_hot_proposals || [];

      renderGreeting(today, needsReply.length);

      $('#todContent').innerHTML = [
        renderKpis(today, yesterday),
        renderPipelineStrip(thisWeek, pipeline),
        renderNeedsReply(needsReply),
        renderHotToday(hotToday),
      ].join('');
    }

    function renderError(msg) {
      $('#todContent').innerHTML = `
        <div style="padding:28px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;color:#7a1010;">
          <div style="font-weight:600;font-size:15px;margin-bottom:6px;">Couldn't load today's signals</div>
          <div>${esc(msg)}</div>
        </div>
      `;
    }

    function scheduleLastRefreshedUpdate(iso) {
      if (_lastRefreshedTimer) clearInterval(_lastRefreshedTimer);
      const update = () => {
        $('#todLastRefreshed').textContent = 'Refreshed ' + timeAgo(iso);
      };
      update();
      _lastRefreshedTimer = setInterval(update, 30000);
    }

    $('#todRefreshBtn').addEventListener('click', loadToday);

    // Sprint 14 — quick-note button delegation
    document.body.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action="quick-note"]');
      if (!btn) return;
      e.preventDefault();
      const clientId   = btn.getAttribute('data-client-id');
      const clientName = btn.getAttribute('data-client-name') || 'Client';
      if (!clientId) return;
      openQuickNoteModal({
        clientId,
        clientName,
        createdBy: auth.user.id,
        onSaved: () => loadToday(),
      });
    });

    loadToday();
    setInterval(() => loadToday(), REFRESH_MS);
  }
</script>

</body>
</html>
